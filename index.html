          ):(
            dayExercises.map((ex,i)=>(
              <div key={ex.id} style={{display:'flex',alignItems:'center',gap:8,
                background:T.elevated,borderRadius:10,padding:'10px 12px',marginBottom:8}}>
                <div style={{display:'flex',flexDirection:'column',gap:2}}>
                  <button onClick={()=>moveExercise(day,i,-1)} disabled={i===0} style={{
                    background:'none',border:'none',color:i===0?T.dim:T.muted,
                    cursor:i===0?'default':'pointer',fontSize:12,padding:0,lineHeight:1,
                  }}>▲</button>
                  <button onClick={()=>moveExercise(day,i,1)} disabled={i===dayExercises.length-1} style={{
                    background:'none',border:'none',color:i===dayExercises.length-1?T.dim:T.muted,
                    cursor:i===dayExercises.length-1?'default':'pointer',fontSize:12,padding:0,lineHeight:1,
                  }}>▼</button>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:T.cream}}>{ex.name}</div>
                  <div style={{fontSize:11,color:T.muted}}>{ex.muscle} · {ex.sets} sets · {ex.reps} reps</div>
                </div>
                <button onClick={()=>removeExercise(day,ex.id)} style={{
                  background:'rgba(155,55,55,0.2)',border:'1px solid rgba(155,55,55,0.3)',
                  color:'#F08080',borderRadius:7,width:30,height:30,cursor:'pointer',
                  fontSize:14,flexShrink:0,
                }}>✕</button>
              </div>
            ))
          )}

          {/* Add new exercise form */}
          <div style={{marginTop:16,paddingTop:16,borderTop:'1px solid '+T.border}}>
            <div style={{fontSize:11,fontWeight:700,color:T.orange,textTransform:'uppercase',
              letterSpacing:1,marginBottom:10}}>+ Add Exercise</div>
            <input type="text" placeholder="Exercise name (e.g. Bench Press)" value={newExName}
              onChange={e=>setNewExName(e.target.value)}
              style={{width:'100%',background:T.elevated,border:'1px solid '+T.border,
                borderRadius:8,color:T.cream,fontSize:14,padding:'9px 12px',
                fontFamily:'inherit',outline:'none',marginBottom:8}}
              onFocus={e=>e.target.style.borderColor=T.orange}
              onBlur={e=>e.target.style.borderColor=T.border}
            />
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
              <input type="text" placeholder="Muscle group" value={newExMuscle}
                onChange={e=>setNewExMuscle(e.target.value)}
                style={{background:T.elevated,border:'1px solid '+T.border,borderRadius:8,
                  color:T.cream,fontSize:13,padding:'9px 10px',fontFamily:'inherit',outline:'none'}}
              />
              <input type="number" placeholder="Sets" value={newExSets}
                onChange={e=>setNewExSets(e.target.value)}
                style={{background:T.elevated,border:'1px solid '+T.border,borderRadius:8,
                  color:T.cream,fontSize:13,padding:'9px 10px',fontFamily:'inherit',outline:'none'}}
              />
              <input type="text" placeholder="Reps" value={newExReps}
                onChange={e=>setNewExReps(e.target.value)}
                style={{background:T.elevated,border:'1px solid '+T.border,borderRadius:8,
                  color:T.cream,fontSize:13,padding:'9px 10px',fontFamily:'inherit',outline:'none'}}
              />
            </div>
            <button onClick={()=>addExercise(day)} style={{
              width:'100%',background:T.orange,border:'none',color:'#fff',
              borderRadius:8,padding:'11px',cursor:'pointer',fontSize:14,
              fontWeight:700,fontFamily:'inherit',
            }}>+ Add to {day}</button>
          </div>

          <button onClick={resetToDefaults} style={{
            width:'100%',background:'none',border:'1px solid '+T.border,color:T.muted,
            borderRadius:8,padding:'10px',cursor:'pointer',fontSize:12,
            fontFamily:'inherit',marginTop:16,
          }}>Reset all days to default plan</button>
        </div>
      </div>
    );
  }

  // Exercise history view
  if(historyEx){
    const hist = LS.get('gymHist-'+historyEx.id,[]);
    const pb = LS.get('gymPB-'+historyEx.id,{weight:0});
    return (
      <div>
        <button onClick={()=>setHistoryEx(null)} style={{
          background:'none',border:'none',color:T.orange,cursor:'pointer',
          fontSize:14,fontWeight:700,fontFamily:'inherit',marginBottom:16,padding:0,
        }}>← Back to Workout</button>
        <div style={{background:T.surface,border:'1px solid '+T.border,borderRadius:16,
          padding:'20px 22px',marginBottom:20}}>
          <div style={{fontSize:11,color:T.orange,fontWeight:700,letterSpacing:2,
            textTransform:'uppercase',marginBottom:4}}>{historyEx.muscle}</div>
          <div style={{fontSize:28,fontWeight:900,color:T.cream,marginBottom:4}}>{historyEx.name}</div>
          <div style={{display:'flex',gap:16}}>
            <div><div style={{fontSize:24,fontWeight:900,color:'#FFD700'}}>
              {pb.weight||'-'}kg</div><div style={{fontSize:11,color:T.muted}}>Personal Best</div></div>
            <div><div style={{fontSize:24,fontWeight:900,color:T.orange}}>
              {hist.length}</div><div style={{fontSize:11,color:T.muted}}>Sessions</div></div>
          </div>
        </div>

        {/* Simple weight graph */}
        {hist.length>1&&(
          <div style={{background:T.surface,border:'1px solid '+T.border,borderRadius:16,
            padding:'20px 22px',marginBottom:20}}>
            <div style={{fontSize:11,color:T.muted,fontWeight:700,letterSpacing:2,
              textTransform:'uppercase',marginBottom:14}}>Weight Progress</div>
            <div style={{display:'flex',alignItems:'flex-end',gap:4,height:100}}>
              {hist.slice(-12).map((h,i)=>{
                const maxW=Math.max(...hist.slice(-12).map(x=>x.weight));
                const minW=Math.min(...hist.slice(-12).map(x=>x.weight));
                const hPct=maxW===minW?50:((h.weight-minW)/(maxW-minW))*80+10;
                return (
                  <div key={i} style={{flex:1,display:'flex',flexDirection:'column',
                    alignItems:'center',gap:3}}>
                    <div style={{fontSize:9,color:T.muted}}>{h.weight}</div>
                    <div style={{width:'100%',height:hPct+'px',background:T.orange,
                      borderRadius:'3px 3px 0 0',opacity:0.6+i*0.033,
                      transition:'height 0.5s ease'}}/>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Recent sessions */}
        <div style={{fontSize:11,color:T.muted,fontWeight:700,letterSpacing:2,
          textTransform:'uppercase',marginBottom:12}}>Recent Sessions</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {hist.slice().reverse().slice(0,10).map((h,i)=>(
            <div key={i} style={{background:T.surface,border:'1px solid '+T.border,
              borderRadius:10,padding:'11px 14px',display:'flex',
              justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:12,color:T.muted}}>
                {new Date(h.date).toLocaleDateString('en-AU',{day:'numeric',month:'short'})}
              </div>
              <div style={{display:'flex',gap:16}}>
                <span style={{fontSize:13,fontWeight:700,color:T.cream}}>{h.weight}kg</span>
                <span style={{fontSize:12,color:T.muted}}>{h.reps} reps</span>
                <span style={{fontSize:12,color:T.orange}}>1RM ~{h.orm}kg</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div>
      {showTimer&&<RestTimer onClose={()=>setShowTimer(false)}/>}

      {/* Header */}
      <div style={{background:'linear-gradient(135deg,rgba(212,98,42,0.12),'+T.surface+')',
        border:'1px solid '+T.orange+'44',borderRadius:16,padding:'22px 24px',marginBottom:20}}>
        <div style={{fontSize:11,color:T.orange,fontWeight:700,letterSpacing:2,
          textTransform:'uppercase',marginBottom:4}}>GYM TRACKER</div>
        <div style={{fontSize:32,fontWeight:900,color:T.cream,letterSpacing:'-1px',marginBottom:8}}>
          {split.icon} {split.focus}
        </div>
        <div style={{display:'flex',gap:12,flexWrap:'wrap',rowGap:8}}>
          <div style={{background:T.elevated,borderRadius:9,padding:'7px 14px',fontSize:12}}>
            <span style={{color:T.muted}}>Completed: </span>
            <strong style={{color:'#5AC983'}}>{completed}/{exercises.length}</strong>
          </div>
          <div style={{background:T.elevated,borderRadius:9,padding:'7px 14px',fontSize:12}}>
            <span style={{color:T.muted}}>Duration: </span>
            <strong style={{color:T.orange}}>{elapsed}min</strong>
          </div>
          <button onClick={()=>setShowTimer(true)} style={{
            background:T.orangeDim,border:'1px solid '+T.orange+'55',color:T.orange,
            borderRadius:9,padding:'7px 14px',cursor:'pointer',fontSize:12,
            fontWeight:700,fontFamily:'inherit',
          }}>⏱ Rest Timer</button>
          <button onClick={()=>{setEditDay(activeDay);setView('edit');}} style={{
            background:T.elevated,border:'1px solid '+T.border,color:T.muted,
            borderRadius:9,padding:'7px 14px',cursor:'pointer',fontSize:12,
            fontWeight:700,fontFamily:'inherit',
          }}>✏️ Edit Plan</button>
        </div>
      </div>

      {/* Tab nav */}
      <div style={{display:'flex',gap:0,marginBottom:20,
        background:T.surface,borderRadius:10,border:'1px solid '+T.border,overflow:'hidden'}}>
        {[['workout','Today'],['split','Weekly Split']].map(([val,lbl])=>(
          <button key={val} onClick={()=>setView(val)} style={{
            flex:1,background:view===val?T.orange:'transparent',
            border:'none',color:view===val?'#fff':T.muted,
            padding:'11px',cursor:'pointer',fontSize:13,fontWeight:700,
            fontFamily:'inherit',transition:'all 0.15s',
          }}>{lbl}</button>
        ))}
      </div>

      {view==='split'&&(
        <div>
          {weeklySplit.map((s,i)=>(
            <button key={i} onClick={()=>{setActiveDay(s.day);setView('workout');}} style={{
              width:'100%',background:s.day===todayName?T.orangeDim:T.surface,
              border:'1px solid '+(s.day===todayName?T.orange:T.border),
              borderRadius:12,padding:'14px 18px',cursor:'pointer',fontFamily:'inherit',
              marginBottom:8,display:'flex',alignItems:'center',gap:14,textAlign:'left',
              transition:'all 0.15s',
            }}>
              <span style={{fontSize:28,flexShrink:0}}>{s.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:s.day===todayName?T.orange:T.cream}}>
                  {s.day} {s.day===todayName?'(Today)':''}
                </div>
                <div style={{fontSize:12,color:T.muted}}>{s.focus}</div>
              </div>
              <div style={{fontSize:12,color:T.muted}}>
                {(workouts[s.day]||[]).length} exercises
              </div>
            </button>
          ))}
        </div>
      )}

      {view==='workout'&&(
        <div>
          {/* Day picker */}
          <div style={{display:'flex',gap:4,marginBottom:18,overflowX:'auto',paddingBottom:4,scrollbarWidth:'none'}}>
            {days.map(d=>(
              <button key={d} onClick={()=>setActiveDay(d)} style={{
                flexShrink:0,background:activeDay===d?T.orange:T.surface,
                border:'1px solid '+(activeDay===d?T.orange:T.border),
                color:activeDay===d?'#fff':T.muted,
                borderRadius:8,padding:'7px 12px',cursor:'pointer',
                fontSize:12,fontWeight:700,fontFamily:'inherit',
                outline:d===todayName?'2px solid '+T.orange+'44':'none',
                outlineOffset:2,
              }}>{d.slice(0,3)}</button>
            ))}
          </div>

          {/* Progress bar */}
          {exercises.length>0&&(
            <div style={{marginBottom:16}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                <span style={{fontSize:12,color:T.muted}}>Progress</span>
                <span style={{fontSize:12,color:'#5AC983',fontWeight:700}}>
                  {completed}/{exercises.length} exercises
                </span>
              </div>
              <div style={{height:6,background:T.border,borderRadius:3,overflow:'hidden'}}>
                <div style={{height:'100%',
                  width:(exercises.length>0?(completed/exercises.length)*100:0)+'%',
                  background:'#5AC983',borderRadius:3,transition:'width 0.5s ease'}}/>
              </div>
            </div>
          )}

          {/* Exercises */}
          {exercises.length===0?(
            <div style={{textAlign:'center',padding:'60px 20px',color:T.muted}}>
              <div style={{fontSize:48,marginBottom:12}}>😴</div>
              <div style={{fontSize:16,fontWeight:700,color:T.cream}}>Rest Day</div>
              <div style={{fontSize:13,marginTop:8}}>Recovery is part of the program. Eat well, sleep well.</div>
            </div>
          ):(
            exercises.map(ex=>(
              <div key={ex.id}>
                <ExerciseRow ex={ex} dayKey={activeDay} sessionData={sessionData}
                  onUpdate={updateSession} onTimer={()=>setShowTimer(true)}/>
                <button onClick={()=>setHistoryEx(ex)} style={{
                  background:'none',border:'none',color:T.muted,cursor:'pointer',
                  fontSize:11,fontFamily:'inherit',marginTop:-6,marginBottom:8,
                  paddingLeft:4,
                }}>📈 View history</button>
              </div>
            ))
          )}
        </div>
      )}
    </div>
  );
};

  set: (key, val) => { try { localStorage.setItem('sf_'+key, JSON.stringify(val)); } catch(e){} },
};

function App() {
  const [page,setPage]=useState('home');
  const [favs,setFavs]=useState(()=>LS.get('favs',[]));
  const [shopItems,setShopItems]=useState(()=>LS.get('shopItems',[]));
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [searchOpen,setSearchOpen]=useState(false);
  const [globalSearch,setGlobalSearch]=useState('');
  const [searchResults,setSearchResults]=useState([]);
  const [openRecipe,setOpenRecipe]=useState(null);
  const [campForm,setCampForm]=useState(()=>LS.get('campForm',{people:'4',days:'3',campfire:true,weber:false,jetboil:true,castIron:true}));
  const [campPlan,setCampPlan]=useState(()=>LS.get('campPlan',null));
  const [progressEntries,setProgressEntries]=useState(()=>LS.get('progressEntries',[]));
  const [dashData,setDashData]=useState(()=>LS.get('dashData',{
    weight:'86',goalWeight:'80',proteinToday:'0',proteinTarget:'180',
    caloriesToday:'0',calorieTarget:'2000',waterLitres:'0',waterTarget:'3',
    mealsReady:'0',mealPrepStreak:'0',moneySaved:'0',nextCampDate:'',notes:'',
  }));

  // ── Daily reset ────────────────────────────────────────────────────────────
  // Runs on every app open - if it's a new day, reset daily stats
  useEffect(()=>{
    const today = new Date().toDateString();
    const lastOpen = LS.get('lastOpenDate','');
    if(lastOpen !== today){
      LS.set('lastOpenDate', today);
      // Reset daily stats but keep persistent ones (weight, streak, money saved)
      setDashData(prev=>({
        ...prev,
        caloriesToday:'0',
        proteinToday:'0',
      }));
      // Reset water
      LS.set('waterTapped', 0);
      // Keep all logged meals for analytics history - don't clear them
    }
  },[]);

  // Persist to localStorage whenever state changes
  useEffect(()=>{ LS.set('favs',favs); },[favs]);
  useEffect(()=>{ LS.set('shopItems',shopItems); },[shopItems]);
  useEffect(()=>{ LS.set('campForm',campForm); },[campForm]);
  useEffect(()=>{ LS.set('campPlan',campPlan); },[campPlan]);
  useEffect(()=>{ LS.set('progressEntries',progressEntries); },[progressEntries]);
  useEffect(()=>{ LS.set('dashData',dashData); },[dashData]);

  const toggleFav=useCallback((id)=>{
    setFavs(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  },[]);

  // Log a meal - adds macros to today's dashboard totals
  const [loggedMeals,setLoggedMeals]=useState(()=>LS.get('loggedMeals',[]));
  useEffect(()=>{ LS.set('loggedMeals',loggedMeals); },[loggedMeals]);

  const logMeal=useCallback((recipe,serves=1)=>{
    const today=new Date().toDateString();
    const entry={
      id:recipe.id,
      name:recipe.name,
      emoji:recipe.emoji,
      time:new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'}),
      protein:Math.round(recipe.macros.protein*serves),
      calories:Math.round(recipe.macros.calories*serves),
      carbs:Math.round(recipe.macros.carbs*serves),
      fat:Math.round(recipe.macros.fat*serves),
      cost:Math.round(recipe.cost*serves*100)/100,
      serves,
      loggedAt:Date.now(),
    };

    // Takeaway comparison prices by chapter
    const takeawayPrice=(r)=>{
      if(r.chapter==='breakfast') return 18;   // cafe breakfast
      if(r.chapter==='lunch') return 16;        // work lunch takeaway
      if(r.chapter==='smoko') return 6;         // servo snack
      if(r.chapter==='camping') return 0;       // no takeaway comparison
      if(r.chapter==='bbq') return 28;          // restaurant
      if(r.chapter==='fakeaway') return 18;     // actual takeaway
      if(r.chapter==='desserts') return 8;      // cafe dessert
      if(r.chapter==='drinks') return 7;        // smoothie bar
      return 15;
    };
    const saved=Math.max(0, takeawayPrice(recipe)*serves - recipe.cost*serves);

    setLoggedMeals(p=>{
      const filtered=p.filter(m=>new Date(m.loggedAt).toDateString()!==today||m.id!==recipe.id);
      return [...filtered,entry];
    });

    setDashData(prev=>{
      // --- Money saved: add to weekly total ---
      const newMoneySaved=Math.round((Number(prev.moneySaved||0)+saved)*100)/100;

      // --- Meal prep streak ---
      // Get last logged date from storage
      const lastLogDate=LS.get('lastLogDate','');
      const yesterday=new Date();
      yesterday.setDate(yesterday.getDate()-1);
      const yesterdayStr=yesterday.toDateString();

      let newStreak=Number(prev.mealPrepStreak||0);
      if(lastLogDate===today){
        // Already logged today - streak stays same
      } else if(lastLogDate===yesterdayStr || lastLogDate===''){
        // Logged yesterday or first ever log - increment streak
        newStreak=newStreak+1;
        LS.set('lastLogDate',today);
      } else {
        // Missed a day - reset streak to 1
        newStreak=1;
        LS.set('lastLogDate',today);
      }

      return {
        ...prev,
        proteinToday:String(Number(prev.proteinToday||0)+Math.round(recipe.macros.protein*serves)),
        caloriesToday:String(Number(prev.caloriesToday||0)+Math.round(recipe.macros.calories*serves)),
        moneySaved:String(newMoneySaved),
        mealPrepStreak:String(newStreak),
      };
    });
  },[]);

  const removeLoggedMeal=useCallback((meal)=>{
    setLoggedMeals(p=>p.filter(m=>!(m.id===meal.id&&m.loggedAt===meal.loggedAt)));
    setDashData(prev=>({
      ...prev,
      proteinToday:String(Math.max(0,Number(prev.proteinToday||0)-meal.protein)),
      caloriesToday:String(Math.max(0,Number(prev.caloriesToday||0)-meal.calories)),
      moneySaved:String(Math.max(0,Math.round((Number(prev.moneySaved||0)-(meal.savedAmount||0))*100)/100)),
    }));
  },[]);

  const addToShop=useCallback((recipe)=>{
    const priceFor=(ing)=>{
      const n=ing.toLowerCase();
      if(n.includes('chicken breast'))return 5.99;
      if(n.includes('chicken thigh'))return 4.99;
      if(n.includes('beef mince')||n.includes('lean mince'))return 5.49;
      if(n.includes('pork shoulder')||n.includes('pork belly'))return 7.99;
      if(n.includes('pork rib')||n.includes('rack pork'))return 12.99;
      if(n.includes('steak')||n.includes('scotch fillet')||n.includes('rump'))return 13.99;
      if(n.includes('tuna'))return 1.09;
      if(n.includes('salmon'))return 7.99;
      if(n.includes('bacon'))return 4.49;
      if(n.includes('sausage')||n.includes('frankfurt'))return 4.99;
      if(n.includes('egg'))return 3.49;
      if(n.includes('full fat milk')||n.includes('milk'))return 2.19;
      if(n.includes('greek yoghurt')||n.includes('yoghurt'))return 3.49;

      if(n.includes('butter'))return 3.79;
      if(n.includes('parmesan'))return 3.99;
      if(n.includes('mozzarella'))return 3.49;
      if(n.includes('shredded cheese')||n.includes('american cheese'))return 4.49;

      if(n.includes('sour cream'))return 1.99;
      if(n.includes('penne')||n.includes('pasta')||n.includes('spaghetti'))return 1.29;
      if(n.includes('jasmine rice')||n.includes('basmati rice')||n.includes('cooked rice'))return 3.49;
      if(n.includes('rolled oats')||n.includes('oats'))return 2.49;
      if(n.includes('flour tortilla')||n.includes('tortilla'))return 3.29;
      if(n.includes('brioche bun')||n.includes('bread roll')||n.includes('bun'))return 3.49;
      if(n.includes('bread'))return 2.99;
      if(n.includes('panko')||n.includes('breadcrumb'))return 2.29;
      if(n.includes('self-raising flour')||n.includes('plain flour'))return 1.49;
      if(n.includes('black beans')||n.includes('kidney beans'))return 0.99;
      if(n.includes('crushed tomato')||n.includes('diced tomato'))return 0.99;
      if(n.includes('corn kernel')||n.includes('canned corn'))return 0.89;
      if(n.includes('coconut cream'))return 1.79;
      if(n.includes('baked beans'))return 0.99;
      if(n.includes('pesto'))return 3.49;
      if(n.includes('pasta sauce')||n.includes('napoli'))return 2.49;
      if(n.includes('salsa'))return 3.49;
      if(n.includes('baby spinach')||n.includes('spinach'))return 2.99;
      if(n.includes('cherry tomato'))return 3.49;
      if(n.includes('broccoli'))return 2.49;
      if(n.includes('cucumber'))return 1.49;
      if(n.includes('onion'))return 1.99;
      if(n.includes('garlic'))return 1.49;
      if(n.includes('potato'))return 3.49;
      if(n.includes('avocado'))return 1.49;
      if(n.includes('banana'))return 2.99;
      if(n.includes('frozen berries')||n.includes('mixed berries'))return 4.49;
      if(n.includes('lemon')||n.includes('lime'))return 0.79;
      if(n.includes('corn chip'))return 2.99;
      if(n.includes('olive oil'))return 4.99;
      if(n.includes('soy sauce'))return 2.29;
      if(n.includes('honey'))return 4.49;
      if(n.includes('peanut butter'))return 3.49;
      if(n.includes('sesame oil'))return 3.49;
      if(n.includes('oyster sauce'))return 2.99;
      if(n.includes('sweet chilli'))return 2.29;
      if(n.includes('hoisin'))return 2.99;
      if(n.includes('mayo')||n.includes('mayonnaise'))return 3.49;
      if(n.includes('maple syrup'))return 5.99;
      if(n.includes('cocoa'))return 3.49;
      if(n.includes('choc chip')||n.includes('chocolate chip'))return 2.99;
      if(n.includes('bbq sauce'))return 2.99;
      if(n.includes('taco seasoning'))return 0.99;
      if(n.includes('marshmallow'))return 2.49;
      if(n.includes('digestive')||n.includes('biscuit'))return 2.49;
      if(n.includes('granola'))return 3.49;
      if(n.includes('chia seed'))return 4.49;
      if(n.includes('almond')||n.includes('cashew')||n.includes('pumpkin seed'))return 4.99;
      if(n.includes('dried cranberr'))return 3.99;
      if(n.includes('apple juice'))return 2.99;
      if(n.includes('beer'))return 1.80;
      if(n.includes('kalamata olive')||n.includes('olive'))return 2.99;
      if(n.includes('protein powder')||n.includes('protein'))return 0;
      if(n.includes('water')||n.includes('salt')||n.includes('pepper')||
         n.includes('cumin')||n.includes('paprika')||n.includes('turmeric')||
         n.includes('garam masala')||n.includes('oregano')||n.includes('cajun')||
         n.includes('vanilla')||n.includes('baking powder')||n.includes('cornflour')||
         n.includes('brown sugar')||n.includes('sugar')||n.includes('seasoning')||
         n.includes('herb')||n.includes('rosemary')||n.includes('thyme'))return 0;
      return 1.99;
    };
    const newItems=(recipe.ingredients||[]).map((ing,i)=>({
      id:`${recipe.id}-${i}`,
      name:ing,
      checked:false,
      aldi:!ing.toLowerCase().includes('protein powder'),
      cost:priceFor(ing),
    }));
    setShopItems(prev=>{
      const existing=prev.map(p=>p.name);
      return [...prev,...newItems.filter(n=>!existing.includes(n.name))];
    });
  },[]);

  const toggleShopItem=useCallback((item)=>{
    setShopItems(p=>p.map(i=>i.id===item.id?{...i,checked:!i.checked}:i));
  },[]);

  useEffect(()=>{
    if(globalSearch.length>1){
      const res=RECIPES.filter(r=>
        r.name.toLowerCase().includes(globalSearch.toLowerCase())||
        r.tags.some(t=>t.includes(globalSearch.toLowerCase()))||
        r.ingredients?.some(ing=>ing.toLowerCase().includes(globalSearch.toLowerCase()))
      ).slice(0,8);
      setSearchResults(res);
    }else{
      setSearchResults([]);
    }
  },[globalSearch]);

  const navTo=(id)=>{
    setPage(id);
    setSidebarOpen(false);
  };

  const renderPage=()=>{
    if(page==='home')return <Dashboard onNav={navTo} favs={favs} dashData={dashData} setDashData={setDashData} loggedMeals={loggedMeals} removeLoggedMeal={removeLoggedMeal} />;
    if(page==='recipes')return <RecipesPage chapter={null} favs={favs} onFavToggle={toggleFav} onShopAdd={addToShop} onLogMeal={logMeal} loggedMeals={loggedMeals} />;
    if(CHAPTERS.find(c=>c.id===page))return <RecipesPage chapter={page} favs={favs} onFavToggle={toggleFav} onShopAdd={addToShop} onLogMeal={logMeal} loggedMeals={loggedMeals} />;
    if(page==='shopping')return <ShoppingPage items={shopItems} onToggle={toggleShopItem} onClear={()=>setShopItems([])} />;
    if(page==='lockin')return <LockInPage />;
    if(page==='camping-mode')return <CampModePage form={campForm} setForm={setCampForm} plan={campPlan} setPlan={setCampPlan} onShopAdd={addToShop} />;
    if(page==='progress')return <ProgressPage entries={progressEntries} setEntries={setProgressEntries} dashData={dashData} />;
    if(page==='gym')return <GymPage />;
    if(page==='calories')return <PortionCalcPage dashData={dashData} />;
    if(page==='fastfood')return <FastFoodPage dashData={dashData} />;
    if(page==='settings')return <SettingsPage />;
    return <Dashboard onNav={navTo} favs={favs} />;
  };

  const SIDEBAR_W=240;

  return (
    <div style={{background:T.bg,minHeight:'100vh',color:T.cream,fontFamily:'"Inter",system-ui,sans-serif'}}>

      {/* Sidebar */}
      <div style={{
        position:'fixed',left:0,top:0,bottom:0,width:SIDEBAR_W,
        background:T.surface,borderRight:`1px solid ${T.border}`,
        zIndex:200,display:'flex',flexDirection:'column',
        transform:sidebarOpen?'translateX(0)':`translateX(-${SIDEBAR_W}px)`,
        transition:'transform 0.25s ease',
      }}>
        {/* Logo */}
        <div style={{padding:'22px 20px 16px',borderBottom:`1px solid ${T.border}`}}>
          <div style={{fontSize:22,fontWeight:900,color:T.orange,letterSpacing:'-0.5px'}}>
            ⚡ SPARKY FUEL
          </div>
          <div style={{fontSize:10,color:T.muted,letterSpacing:2,marginTop:2,fontWeight:600}}>
            TRADIE LIFESTYLE OS
          </div>
        </div>

        {/* Nav */}
        <div style={{flex:1,overflowY:'auto',padding:'10px 10px',scrollbarWidth:'none'}}>
          {NAV.map(item=>{
            const active=page===item.id;
            const isCh=item.chapter;
            return (
              <button key={item.id} onClick={()=>navTo(item.id)} style={{
                width:'100%',display:'flex',alignItems:'center',gap:10,
                padding: isCh?'8px 12px 8px 20px':'10px 12px',
                borderRadius:9,border:'none',cursor:'pointer',fontFamily:'inherit',
                background:active?T.orangeDim:'transparent',
                color:active?T.orange:isCh?T.muted:T.cream,
                fontSize:isCh?12:13,fontWeight:isCh?500:600,
                marginBottom:2,transition:'all 0.12s',
                borderLeft:active?`2px solid ${T.orange}`:'2px solid transparent',
              }}
              onMouseEnter={e=>{ if(!active){e.currentTarget.style.background=T.elevated;} }}
              onMouseLeave={e=>{ if(!active){e.currentTarget.style.background='transparent';} }}>
                <span style={{fontSize:isCh?13:15,flexShrink:0}}>{item.icon}</span>
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.label}</span>
                {item.id==='shopping'&&shopItems.length>0&&(
                  <span style={{
                    marginLeft:'auto',background:T.orange,color:'#fff',
                    borderRadius:100,padding:'1px 7px',fontSize:10,fontWeight:700,
                  }}>{shopItems.filter(i=>!i.checked).length}</span>
                )}
              </button>
            );
          })}
        </div>

        <div style={{padding:'14px 18px',borderTop:`1px solid ${T.border}`,
          fontSize:10,color:T.dim,letterSpacing:1}}>
          v1.0 · sparkyfuel.com
        </div>
      </div>

      {/* Sidebar backdrop (mobile) */}
      {sidebarOpen&&(
        <div style={{
          position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:199,backdropFilter:'blur(4px)',
        }} onClick={()=>setSidebarOpen(false)} />
      )}

      {/* Top bar */}
      <div style={{
        position:'fixed',top:0,left:0,right:0,
        paddingTop:'env(safe-area-inset-top,0px)',
        background:T.surface,borderBottom:`1px solid ${T.border}`,
        zIndex:100,display:'flex',alignItems:'center',padding:'env(safe-area-inset-top,0px) 16px 0 16px',gap:12,height:'calc(56px + env(safe-area-inset-top,0px))',
      }}>
        <button onClick={()=>setSidebarOpen(!sidebarOpen)} style={{
          background:'none',border:'none',color:T.cream,fontSize:20,
          cursor:'pointer',padding:6,borderRadius:7,lineHeight:1,
          display:'flex',alignItems:'center',justifyContent:'center',
        }}>
          {sidebarOpen?'✕':'☰'}
        </button>

        <div style={{fontSize:16,fontWeight:900,color:T.orange,letterSpacing:'-0.3px'}}>
          ⚡ SPARKY FUEL
        </div>

        <div style={{flex:1}} />

        {/* Search icon button - opens overlay */}
        <button onClick={()=>setSearchOpen(true)} style={{
          background:T.elevated,border:`1px solid ${T.border}`,color:T.cream,
          borderRadius:8,padding:'8px 12px',cursor:'pointer',fontSize:16,
          display:'flex',alignItems:'center',gap:6,fontFamily:'inherit',
        }}>
          🔍
        </button>

        {/* Search overlay */}
        {searchOpen&&(
          <div style={{
            position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',zIndex:600,
            display:'flex',alignItems:'flex-start',justifyContent:'center',
            padding:'80px 16px 20px',backdropFilter:'blur(6px)',
          }} onClick={e=>{if(e.target===e.currentTarget){setSearchOpen(false);setGlobalSearch('');}}}>
            <div style={{
              background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,
              width:'100%',maxWidth:560,boxShadow:'0 24px 60px rgba(0,0,0,0.7)',overflow:'hidden',
            }}>
              {/* Search input */}
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',
                borderBottom:`1px solid ${T.border}`}}>
                <span style={{fontSize:18}}>🔍</span>
                <input
                  autoFocus
                  placeholder="Search recipes, ingredients, goals..."
                  value={globalSearch}
                  onChange={e=>setGlobalSearch(e.target.value)}
                  style={{
                    flex:1,background:'transparent',border:'none',
                    color:T.cream,fontSize:15,fontFamily:'inherit',outline:'none',
                  }}
                />
                <button onClick={()=>{setSearchOpen(false);setGlobalSearch('');}} style={{
                  background:'none',border:'none',color:T.muted,fontSize:18,
                  cursor:'pointer',padding:4,lineHeight:1,
                }}>✕</button>
              </div>

              {/* Results */}
              {globalSearch.length>0&&(
                <div style={{maxHeight:400,overflowY:'auto'}}>
                  {searchResults.length===0?(
                    <div style={{padding:'28px 16px',textAlign:'center',color:T.muted,fontSize:13}}>
                      No recipes found for that search
                    </div>
                  ):(
                    searchResults.map(r=>(
                      <button key={r.id} onClick={()=>{setOpenRecipe(r);setSearchOpen(false);setGlobalSearch('');}}
                        style={{
                          width:'100%',display:'flex',gap:12,padding:'12px 16px',
                          background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',
                          borderBottom:`1px solid ${T.border}`,textAlign:'left',
                          transition:'background 0.1s',
                        }}
                        onMouseEnter={e=>e.currentTarget.style.background=T.elevated}
                        onMouseLeave={e=>e.currentTarget.style.background='none'}>
                        <div style={{
                          width:44,height:44,borderRadius:10,background:T.elevated,
                          overflow:'hidden',display:'flex',alignItems:'center',
                          justifyContent:'center',fontSize:22,flexShrink:0,
                        }}>
                          {r.photo
                            ?<img src={r.photo} style={{width:'100%',height:'100%',objectFit:'cover'}}
                                onError={e=>{e.target.style.display='none'}} alt=""/>
                            :r.emoji}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:14,fontWeight:700,color:T.cream,marginBottom:3}}>{r.name}</div>
                          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                            <span style={{fontSize:11,color:T.orange,fontWeight:600}}>💪 {r.macros.protein}g protein</span>
                            <span style={{fontSize:11,color:T.muted}}>🔥 {r.macros.calories} kcal</span>
                            <span style={{fontSize:11,color:T.muted}}>💰 \${r.cost.toFixed(2)}</span>
                            <span style={{fontSize:11,color:T.muted}}>⏱ {r.prep+r.cook}m</span>
                          </div>
                        </div>
                      </button>
                    ))
                  )}
                </div>
              )}

              {/* Quick links when no query */}
              {globalSearch.length===0&&(
                <div style={{padding:'14px 16px'}}>
                  <div style={{fontSize:11,fontWeight:700,color:T.muted,textTransform:'uppercase',
                    letterSpacing:1,marginBottom:10}}>Quick Search</div>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    {['high-protein','chicken','camping','under $5','meal prep','BBQ','quick'].map(tag=>(
                      <button key={tag} onClick={()=>setGlobalSearch(tag)} style={{
                        background:T.elevated,border:`1px solid ${T.border}`,color:T.cream,
                        borderRadius:100,padding:'5px 12px',cursor:'pointer',
                        fontSize:12,fontFamily:'inherit',fontWeight:500,
                      }}>{tag}</button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        )}

        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>navTo('shopping')} style={{
            background:'none',border:`1px solid ${T.border}`,color:T.cream,
            borderRadius:8,padding:'7px 10px',cursor:'pointer',fontSize:13,position:'relative',
          }}>
            🛒
            {shopItems.filter(i=>!i.checked).length>0&&(
              <span style={{
                position:'absolute',top:-4,right:-4,background:T.orange,color:'#fff',
                borderRadius:'50%',width:16,height:16,fontSize:9,fontWeight:700,
                display:'flex',alignItems:'center',justifyContent:'center',
              }}>{shopItems.filter(i=>!i.checked).length}</span>
            )}
          </button>
          <button onClick={()=>navTo('progress')} style={{
            background:'none',border:`1px solid ${T.border}`,color:T.cream,
            borderRadius:8,padding:'7px 10px',cursor:'pointer',fontSize:13,
          }}>📊</button>
        </div>
      </div>

      {/* Main content */}
      <div style={{
        marginLeft:sidebarOpen?0:0,
        paddingTop:'calc(56px + env(safe-area-inset-top,0px))',minHeight:'100vh',
      }}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'28px 16px 80px'}}>
          {renderPage()}
        </div>
      </div>

      {/* Global recipe modal */}
      {openRecipe&&(
        <RecipeModal
          recipe={openRecipe}
          onClose={()=>setOpenRecipe(null)}
          onFavToggle={toggleFav}
          isFav={favs.includes(openRecipe.id)}
          onShopAdd={addToShop}
        />
      )}
    </div>
  );
}

</script>
</body>
</html>
