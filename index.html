    qs('https://unpkg.com/@babel/standalone@7.23.5/babel.min.js', function() {
      try {
        var src = document.getElementById('app-src').textContent;
        var compiled = Babel.transform(src, {
          presets: [['react',{}]],
          filename: 'app.jsx'

        var run = new Function('React','ReactDOM', compiled + '\nreturn App;');

        document.getElementById('root').style.display = 'block';
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
      } catch(e) {
        console.error(e);
        showError(e.message.substring(0,120));
      }
    }, function(){ showError('Failed to load Babel. Check connection.'); });
  }, function(){ showError('Failed to load ReactDOM.'); });
}, function(){ showError('Failed to load React.'); });

const Tag = ({children, color=T.orange, active=false}) => (
  <span style={{
    fontSize:10,fontWeight:700,letterSpacing:0.5,textTransform:'uppercase',
    padding:'3px 9px',borderRadius:100,whiteSpace:'nowrap',
    background: active ? color : `${color}18`,
    color: active ? '#fff' : color,
    border:`1px solid ${color}33`,
  }}>{children}</span>
);

const StatBox = ({icon,value,label,color=T.cream,mono=false}) => (
  <div style={{
    background:T.elevated,border:`1px solid ${T.border}`,borderRadius:10,
    padding:'14px 16px',textAlign:'center',
  }}>
    <div style={{fontSize:20,marginBottom:6}}>{icon}</div>
    <div style={{
      fontSize:22,fontWeight:900,color,
      fontFamily: mono ? 'monospace' : 'inherit',
      letterSpacing: mono ? '-0.5px' : '-0.3px',
      marginBottom:3,
    }}>{value}</div>
    <div style={{fontSize:11,color:T.muted,fontWeight:600,textTransform:'uppercase',letterSpacing:0.5}}>{label}</div>
  </div>
);

const Btn = ({children,onClick,variant='primary',full=false,style={}}) => {
  const [hov,setHov] = useState(false);
  const styles = {
    primary:{background:hov?T.orangeHov:T.orange,color:'#fff',border:'none'},
    ghost:{background:'transparent',color:hov?T.cream:T.muted,border:`1px solid ${hov?T.border:T.dim}`},
    subtle:{background:hov?T.elevated:T.surface,color:T.cream,border:`1px solid ${T.border}`},
    success:{background:T.greenBg,color:'#5AC983',border:`1px solid ${T.green}55`},
    danger:{background:'rgba(155,55,55,0.15)',color:'#F08080',border:'1px solid rgba(155,55,55,0.3)'},
  };
  return (
    <button
      style={{
        ...styles[variant],borderRadius:8,padding:'10px 20px',
        fontFamily:'inherit',fontSize:13,fontWeight:700,cursor:'pointer',
        transition:'all 0.15s',letterSpacing:0.3,
        width:full?'100%':'auto',...style,
      }}
      onClick={onClick}
      onMouseEnter={()=>setHov(true)}
      onMouseLeave={()=>setHov(false)}
    >{children}</button>
  );
};

const Input = ({placeholder,value,onChange,style={},type='text',onKeyDown}) => (
  <input type={type} placeholder={placeholder} value={value} onChange={onChange} onKeyDown={onKeyDown}

);

const PortionGuide = ({recipe:r}) => {
  const goal = LS.get('portionGoal', {calories:'2000', meals:'5', protein:'180'});
  const calsPerMeal = Math.round(Number(goal.calories||2000) / Number(goal.meals||5));
  const protPerMeal = Math.round(Number(goal.protein||180) / Number(goal.meals||5));
  const servesNeeded = Math.round((calsPerMeal / r.macros.calories) * 10) / 10;
  const [containers, setContainers] = useState('');

  const parseIngredient = (ing, n) => {
    const fracs = {'half':0.5, '1/2':0.5, '1/4':0.25, '3/4':0.75};
    const parts = ing.split(' ');
    let num = parseFloat(parts[0]);
    if (isNaN(num)) return null;
    const divided = num / n;
    const unit = parts[1] || '';
    const name = parts.slice(2).join(' ').split('(')[0].trim();
    let display = '';
    if (divided < 0.1) display = 'pinch';
    else if (divided < 1 && unit.toLowerCase() === 'cup') display = Math.round(divided*16) + ' tbsp';
    else if (divided < 1 && unit.toLowerCase() === 'tbsp') display = Math.round(divided*3) + ' tsp';
    else if (divided >= 100) display = Math.round(divided) + 'g';
    else display = (Math.round(divided*10)/10) + ' ' + unit;
    return {name, display};
  };

  const n = Math.max(1, Number(containers) || 1);
  const calsEach = Math.round(r.macros.calories * servesNeeded / (containers ? n : 1));
  const protEach = Math.round(r.macros.protein * servesNeeded / (containers ? n : 1));

  return (
    <div style={{background:T.orangeDim, border:'1px solid rgba(212,98,42,0.3)',
      borderRadius:12, padding:'14px 16px'}}>
      <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:T.orange,
        textTransform:'uppercase',marginBottom:10}}>Your Portion Guide</div>
      <div style={{fontSize:13,color:T.cream,lineHeight:1.8,marginBottom:12}}>
        Your meal target: <strong style={{color:T.orange}}>{calsPerMeal} kcal</strong> and <strong style={{color:'#5AC983'}}>{protPerMeal}g protein</strong><br/>
        For this recipe: eat <strong style={{color:T.orange}}>{servesNeeded}x serves</strong><br/>
        That gives you <strong style={{color:'#5AC983'}}>{Math.round(r.macros.protein*servesNeeded)}g protein</strong> and <strong style={{color:T.orange}}>{Math.round(r.macros.calories*servesNeeded)} kcal</strong>
      </div>

      <div style={{borderTop:'1px solid rgba(212,98,42,0.2)',paddingTop:12,marginTop:4}}>
        <div style={{fontSize:11,fontWeight:700,color:T.orange,letterSpacing:1,
          textTransform:'uppercase',marginBottom:8}}>Container Ingredient Guide</div>
        <div style={{fontSize:12,color:T.muted,marginBottom:10}}>
          How many containers did you fill?
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12}}>
          <input type="number" placeholder="e.g. 5" value={containers}
            onChange={e=>setContainers(e.target.value)}
            min="1" max="20"
            style={{background:T.surface,border:'1px solid rgba(212,98,42,0.4)',
              borderRadius:8,color:T.cream,fontSize:14,padding:'8px 12px',
              fontFamily:'inherit',width:120,outline:'none'}}
          />
          <span style={{fontSize:13,color:T.muted}}>containers</span>
        </div>

        {containers && Number(containers) > 0 && (
          <div style={{background:T.surface,border:'1px solid rgba(212,98,42,0.3)',
            borderRadius:10,padding:14}}>
            <div style={{fontSize:11,fontWeight:700,color:T.orange,letterSpacing:1,
              textTransform:'uppercase',marginBottom:10}}>
              Per container (1 of {containers})
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:0}}>
              {r.ingredients.filter(i=>!i.toLowerCase().startsWith('note:')).map((ing,i)=>{
                const parsed = parseIngredient(ing, Number(containers));
                return (
                  <div key={i} style={{display:'flex',justifyContent:'space-between',
                    padding:'7px 0',borderBottom:'1px solid rgba(51,51,58,0.8)',
                    fontSize:13}}>
                    <span style={{color:T.muted}}>{ing.split(' ').slice(2).join(' ').split('(')[0].trim()||ing}</span>
                    <strong style={{color:T.orange}}>{parsed ? parsed.display : '-'}</strong>
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:12,background:T.elevated,borderRadius:8,
              padding:'10px 12px',display:'flex',gap:16,flexWrap:'wrap'}}>
              <span style={{fontSize:13,fontWeight:700,color:'#5AC983'}}>{protEach}g protein</span>
              <span style={{fontSize:13,fontWeight:700,color:T.orange}}>{calsEach} kcal</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );

const SnackPortionGuide = ({recipe:r, dashData}) => {
  const goal = LS.get('portionGoal', {calories:'2000', meals:'5'});
  const dailyCals = Number(goal.calories||2000);
  const eatenCals = Number(dashData && dashData.caloriesToday || 0);
  const remainingCals = Math.max(0, dailyCals - eatenCals);
  const servesYouCanHave = Math.round((remainingCals / r.macros.calories) * 10) / 10;
  const pctOfRemaining = Math.min(100, Math.round((r.macros.calories / remainingCals) * 100));

  // Specific quantity guidance for common snacks
  const getQuantityTip = () => {
    const name = r.name.toLowerCase();
    const calsPerUnit = {
      'tortilla': {unit:'chips', calsEach:7, gEach:2},
      'nut': {unit:'nuts', calsEach:7, gEach:1.3},
    };
    if (name.includes('tortilla')) {
      const chips = Math.round(remainingCals * 0.3 / 7);
      const grams = Math.round(chips * 2);
      return chips + ' chips (' + grams + 'g) uses 30% of remaining cals';
    }
    if (name.includes('peanut butter')) {
      const tbsp = Math.round(remainingCals * 0.25 / 95);
      return tbsp + ' tbsp peanut butter uses 25% of remaining cals';
    }
    return null;
  };

  const tip = getQuantityTip();

  return (
    <div style={{background:'rgba(139,105,20,0.15)',border:'1px solid rgba(139,105,20,0.4)',
      borderRadius:12,padding:'14px 16px',marginTop:12}}>
      <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:'#E0B84A',
        textTransform:'uppercase',marginBottom:10}}>How Much Can I Have?</div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
        <div style={{background:T.surface,borderRadius:9,padding:'10px 12px',textAlign:'center'}}>
          <div style={{fontSize:11,color:T.muted,marginBottom:4}}>Calories remaining today</div>
          <div style={{fontSize:22,fontWeight:900,color:'#E0B84A',fontFamily:'monospace'}}>
            {remainingCals}
          </div>
          <div style={{fontSize:10,color:T.muted}}>kcal left</div>
        </div>
        <div style={{background:T.surface,borderRadius:9,padding:'10px 12px',textAlign:'center'}}>
          <div style={{fontSize:11,color:T.muted,marginBottom:4}}>Serves you can have</div>
          <div style={{fontSize:22,fontWeight:900,color:servesYouCanHave>=1?'#5AC983':T.orange,fontFamily:'monospace'}}>
            {servesYouCanHave}x
          </div>
          <div style={{fontSize:10,color:T.muted}}>of this snack</div>
        </div>
      </div>

      <div style={{background:T.surface,borderRadius:9,padding:'10px 14px',marginBottom:tip?10:0}}>
        <div style={{fontSize:13,color:T.cream,lineHeight:1.6}}>
          1 serve = <strong style={{color:'#E0B84A'}}>{r.macros.calories} kcal</strong> and <strong style={{color:'#5AC983'}}>{r.macros.protein}g protein</strong>
          <br/>
          That uses <strong style={{color:pctOfRemaining>50?T.red:'#E0B84A'}}>{pctOfRemaining}%</strong> of your remaining calories
        </div>
      </div>

      {tip && (
        <div style={{background:T.orangeDim,borderRadius:9,padding:'9px 12px',
          fontSize:12,color:T.cream,border:'1px solid rgba(212,98,42,0.3)'}}>
          Tip: {tip}
        </div>
      )}

      {remainingCals < r.macros.calories && (
        <div style={{marginTop:10,padding:'9px 12px',background:'rgba(155,55,55,0.15)',
          borderRadius:9,border:'1px solid rgba(155,55,55,0.3)',fontSize:12,color:'#F08080'}}>
          You only have {remainingCals} kcal left — a full serve puts you over.
          Have {Math.max(0,Math.round(remainingCals/r.macros.calories*10)/10)}x serves max.
        </div>
      )}

      <div style={{marginTop:10,fontSize:11,color:T.dim}}>
        Updates as you log meals throughout the day.
      </div>
    </div>
  );
};

// Serves selector component - proper hook usage
const LogMealButton = ({recipe, onLogMeal, onClose}) => {
  // Default to the serves needed to hit calorie target
  const goal = LS.get('portionGoal', {calories:'2000', meals:'5'});
  const calsPerMeal = Math.round(Number(goal.calories||2000) / Number(goal.meals||5));
  const recommendedServes = Math.round((calsPerMeal / recipe.macros.calories) * 10) / 10;
  const [serves, setServes] = useState(recommendedServes > 0 ? recommendedServes : 1);
  if (!onLogMeal) return null;
  return (
    <div style={{display:'flex',gap:6,alignItems:'center',flex:1}}>
      <button onClick={()=>setServes(s=>Math.max(0.5,parseFloat((s-0.5).toFixed(1))))} style={{
        background:T.elevated,border:`1px solid ${T.border}`,color:T.cream,
        borderRadius:7,width:34,height:36,cursor:'pointer',fontSize:18,fontWeight:700,
        display:'flex',alignItems:'center',justifyContent:'center',

      <div style={{
        background:T.elevated,border:`1px solid ${T.orange}`,
        borderRadius:7,padding:'6px 12px',fontSize:14,fontWeight:800,
        color:T.orange,textAlign:'center',minWidth:52,
      }}>{serves}x</div>
      <button onClick={()=>setServes(s=>parseFloat((s+0.5).toFixed(1)))} style={{
        background:T.elevated,border:`1px solid ${T.border}`,color:T.cream,
        borderRadius:7,width:34,height:36,cursor:'pointer',fontSize:18,fontWeight:700,
        display:'flex',alignItems:'center',justifyContent:'center',
      }}>+</button>
      <button onClick={()=>{ onLogMeal(recipe,serves); onClose(); }} style={{

  );
};

const RecipeEditor = ({recipe:r, onClose}) => {
  const savedCustom = LS.get('customIngredients-'+r.id, {
    extraIngredients: [],
    removedIngredients: [],
    extraCalories: 0,
    extraProtein: 0,
    extraCarbs: 0,
    extraFat: 0,
  });
  const [extras, setExtras] = useState(savedCustom.extraIngredients||[]);
  const [removed, setRemoved] = useState(savedCustom.removedIngredients||[]);
  const [search, setSearch] = useState('');
  const [qty, setQty] = useState('100');
  const [selectedIng, setSelectedIng] = useState(null);
  const [saved, setSaved] = useState(false);

  const filtered = INGREDIENT_DB.filter(i=>
    i.name.toLowerCase().includes(search.toLowerCase())
  ).slice(0,8);

  const addExtra = () => {
    if(!selectedIng||!qty) return;
    const amount = Number(qty);
    let cal, prot, carb, fat;
    if(selectedIng.unit==='each'||selectedIng.unit==='tbsp'||selectedIng.unit==='tsp'){
      cal = Math.round(selectedIng.cal * amount);
      prot = Math.round(selectedIng.prot * amount);
      carb = Math.round(selectedIng.carb * amount);
      fat = Math.round(selectedIng.fat * amount);
    } else {
      cal = Math.round(selectedIng.cal * amount / 100);
      prot = Math.round(selectedIng.prot * amount / 100);
      carb = Math.round(selectedIng.carb * amount / 100);
      fat = Math.round(selectedIng.fat * amount / 100);
    }
    const entry = {name:selectedIng.name, amount, unit:selectedIng.unit, cal, prot, carb, fat};
    setExtras(p=>[...p, entry]);
    setSearch(''); setQty('100'); setSelectedIng(null);
  };

  const removeExtra = (i) => setExtras(p=>p.filter((_,idx)=>idx!==i));
  const toggleRemoved = (ing) => setRemoved(p=>
    p.includes(ing) ? p.filter(x=>x!==ing) : [...p, ing]
  );

  const totalExtraCal = extras.reduce((s,e)=>s+e.cal,0);
  const totalExtraProt = extras.reduce((s,e)=>s+e.prot,0);
  const totalExtraCarb = extras.reduce((s,e)=>s+e.carb,0);
  const totalExtraFat = extras.reduce((s,e)=>s+e.fat,0);
  const newCal = r.macros.calories + totalExtraCal;
  const newProt = r.macros.protein + totalExtraProt;

  const saveCustom = () => {
    LS.set('customIngredients-'+r.id, {
      extraIngredients: extras,
      removedIngredients: removed,
      extraCalories: totalExtraCal,
      extraProtein: totalExtraProt,
    });
    setSaved(true);
    setTimeout(()=>{ setSaved(false); onClose(); }, 1000);

  return (

            fontSize:20,cursor:'pointer'}}>✕</button>
        </div>

        {/* Current macros vs new */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:20}}>
          {[
            {l:'Calories',base:r.macros.calories,extra:totalExtraCal,color:T.orange},
            {l:'Protein',base:r.macros.protein,extra:totalExtraProt,color:'#5AC983'},
            {l:'Carbs',base:r.macros.carbs,extra:totalExtraCarb,color:'#B88AE0'},

              {m.extra>0&&<div style={{fontSize:9,color:'#5AC983'}}>+{m.extra}</div>}

              <div style={{fontSize:20,fontWeight:900,color:s.hi?T.orange:T.cream,
                fontFamily:'monospace',marginBottom:2}}>{s.v}</div>
              <div style={{fontSize:10,color:T.muted,fontWeight:600,textTransform:'uppercase'}}>{s.l}</div>
            </div>
          ))}
        </div>

        {/* Info Row */}
        <div style={{display:'flex',flexWrap:'wrap',borderBottom:`1px solid ${T.border}`,background:T.elevated}}>
          {[
            {icon:'💰',v:`$${r.cost.toFixed(2)}/serve`},
            {icon:'⏱',v:`${r.prep}m prep`},
            {icon:'🍳',v:r.cook>0?`${r.cook}m cook`:'No cook'},
            {icon:'👥',v:`${r.serves} serve${r.serves>1?'s':''}`},
            {icon:'❄',v:r.fridge},
          ].map((item,i)=>(
            <div key={i} style={{
              padding:'9px 14px',display:'flex',alignItems:'center',gap:5,
              borderRight:`1px solid ${T.border}`,whiteSpace:'nowrap',
            }}>
              <span style={{fontSize:12}}>{item.icon}</span>
              <span style={{fontSize:11,color:T.muted,fontWeight:500}}>{item.v}</span>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{borderBottom:`1px solid ${T.border}`,display:'flex'}}>
          {[['recipe','Recipe'],['tips','Tips & Notes'],['ratings','Ratings']].map(([val,lbl])=>(
            <button key={val} onClick={()=>setTab(val)} style={{
              background:'none',border:'none',padding:'12px 20px',
              color:tab===val?T.orange:T.muted,cursor:'pointer',fontSize:13,fontWeight:600,
              borderBottom:`2px solid ${tab===val?T.orange:'transparent'}`,
              marginBottom:-1,fontFamily:'inherit',transition:'color 0.15s',
            }}>{lbl}</button>
          ))}
        </div>

        {/* Content */}
        <div style={{padding:'24px 28px 28px',maxHeight:'60vh',overflowY:'auto'}}>
          {tab==='recipe'&&(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:28}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:T.orange,
                  textTransform:'uppercase',marginBottom:12}}>🛒 Ingredients</div>
                <ul style={{listStyle:'none',display:'flex',flexDirection:'column',gap:6}}>
                  {r.ingredients.map((ing,i)=>(
                    <li key={i} style={{
                      display:'flex',gap:8,padding:'8px 11px',
                      background:T.elevated,borderRadius:8,
                      border:`1px solid ${T.border}`,fontSize:13,color:T.cream,
                    }}>
                      <span style={{color:T.orange,flexShrink:0}}>▸</span>{ing}
                    </li>
                  ))}
                </ul>
              </div>
              <div>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:T.orange,
                  textTransform:'uppercase',marginBottom:12}}>👨‍🍳 Method</div>
                <ol style={{listStyle:'none',display:'flex',flexDirection:'column',gap:10}}>
                  {r.method.map((step,i)=>(
                    <li key={i} style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                      <div style={{
                        minWidth:24,height:24,background:T.orange,color:'#fff',
                        borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
                        fontSize:11,fontWeight:800,flexShrink:0,
                      }}>{i+1}</div>
                      <div style={{fontSize:13,color:T.cream,lineHeight:1.65,paddingTop:2}}>{step}</div>
                    </li>
                  ))}
                </ol>
              </div>
            </div>
          )}
          {tab==='tips'&&(
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div style={{background:T.orangeDim,border:`1px solid ${T.orange}44`,borderRadius:12,padding:'16px 18px'}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:T.orange,
                  textTransform:'uppercase',marginBottom:8}}>⚡ Sparky Tips</div>
                <div style={{fontSize:14,color:T.cream,lineHeight:1.7}}>{r.tips}</div>
              </div>
              <div>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:T.muted,
                  textTransform:'uppercase',marginBottom:10}}>Good For</div>
                <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                  {r.goodFor.map(g=><Tag key={g} color={T.green}>{g}</Tag>)}
                </div>
              </div>

              {r.chapter==='snacks'
                ? <SnackPortionGuide recipe={r} dashData={window.__dashData} />
                : <PortionGuide recipe={r} />}
              <div>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:T.muted,
                  textTransform:'uppercase',marginBottom:10}}>📝 Personal Notes</div>
                <textarea placeholder="Add your notes, tweaks, changes after cooking..." style={{
                  width:'100%',background:T.elevated,border:`1px solid ${T.border}`,
                  borderRadius:10,color:T.cream,fontSize:13,padding:'12px 14px',
                  fontFamily:'inherit',resize:'vertical',minHeight:90,outline:'none',
                }}/>
              </div>
            </div>
          )}
          {tab==='ratings'&&(
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:12}}>
              {[
                {icon:'🍱',label:'Meal Prep',val:r.mealPrep},
                {icon:'🏕️',label:'Camping',val:r.camping},
                {icon:'💰',label:'Budget',val:r.budget},
                {icon:'⭐',label:'Ethan Rating',val:r.rating},
              ].map(rt=>(
                <div key={rt.label} style={{
                  background:T.elevated,borderRadius:10,padding:'14px',
                  border:`1px solid ${T.border}`,textAlign:'center',
                }}>
                  <div style={{fontSize:22,marginBottom:6}}>{rt.icon}</div>
                  <div style={{color:T.orange,fontSize:14,letterSpacing:1,marginBottom:4}}>
                    {'★'.repeat(rt.val)}{'☆'.repeat(5-rt.val)}
                  </div>
                  <div style={{fontSize:11,color:T.muted,fontWeight:600}}>{rt.label}</div>
                </div>
              ))}
              <div style={{
                background:T.elevated,borderRadius:10,padding:'14px',
                border:`1px solid ${T.border}`,textAlign:'center',
              }}>
                <div style={{fontSize:22,marginBottom:6}}>🍳</div>
                <div style={{fontSize:22,fontWeight:900,color:T.orange,fontFamily:'monospace'}}>
                  {r.cooked===999?'Daily':r.cooked==='Weekly'?'Weekly':`${r.cooked}x`}
                </div>
                <div style={{fontSize:11,color:T.muted,fontWeight:600}}>Times Made</div>
              </div>
            </div>
          )}
        </div>

        {/* Actions */}
        <div style={{
          padding:'16px 28px',borderTop:`1px solid ${T.border}`,
          display:'flex',gap:10,background:T.elevated,flexWrap:'wrap',
        }}>
          <Btn onClick={()=>onShopAdd(r)} style={{flex:1}}>🛒 Add to Shopping List</Btn>
          <LogMealButton recipe={r} onLogMeal={onLogMeal} onClose={onClose} />
          <Btn onClick={()=>setShowEditor(true)} variant="ghost">
            ✏️ {hasCustom?'Edit Recipe':'Customise Recipe'}
          </Btn>
          <Btn onClick={()=>onFavToggle(r.id)} variant={isFav?'success':'ghost'}>
            {isFav?'♥ Saved':'♡ Save Recipe'}
          </Btn>
          <Btn onClick={onClose} variant="ghost">Close</Btn>
        </div>
      </div>
    </div>
  );
};

// --------------------------------------------------
const Dashboard = ({onNav,favs,dashData:d,setDashData:setD,loggedMeals,removeLoggedMeal}) => {
  const hour = new Date().getHours();
  const greeting = hour<12?'Good Morning':hour<17?'Good Afternoon':'Good Evening';
  // Make dashData globally accessible for snack portion calculator
  if (typeof window !== 'undefined') window.__dashData = d;
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState({...d});
  const [saved, setSaved] = useState(false);

  // Keep draft in sync when d changes externally (e.g. from logMeal)
  useEffect(()=>{ if(!editing) setDraft({...d}); },[d, editing]);

  // Calculate camp countdown
  const campDays = d.nextCampDate
    ? Math.max(0, Math.round((new Date(d.nextCampDate) - new Date()) / (1000*60*60*24)))
    : null;

  const saveEdits = () => {
    setD({...draft});
    setEditing(false);
    setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  };

  const topRecipes = [...RECIPES].sort((a,b)=>b.macros.protein-a.macros.protein).slice(0,4);

  // Quick water tapper
  const [waterTapped, setWaterTapped] = useState(()=>LS.get('waterTapped', 0));
  useEffect(()=>{ LS.set('waterTapped', waterTapped); },[waterTapped]);

  // Always read calorie + protein targets live from portionGoal so Calorie Calc changes show instantly
  const liveGoal = LS.get('portionGoal', {calories:'2000', protein:'180'});
  const liveCalTarget = Number(liveGoal.calories || d.calorieTarget || 2000);
  const liveProtTarget = Number(liveGoal.protein || d.proteinTarget || 180);

  const statCards = [
    {icon:'🔥', label:'Meal Prep Streak', value:`${d.mealPrepStreak} day${Number(d.mealPrepStreak)!==1?'s':''}`, color:T.orange, sub:Number(d.mealPrepStreak)>=7?'🏆 One week!':Number(d.mealPrepStreak)>=3?'Keep it going!':'Log a meal to start'},
    {icon:'⚖️', label:'Current Weight', value:`${d.weight} kg`, color:'#60B8D4',
      sub: d.goalWeight ? `Goal: ${d.goalWeight}kg` : ''},
    {icon:'💪', label:'Protein Today', value:`${d.proteinToday}g`, color:'#5AC983',
      sub:`Target: ${liveProtTarget}g`},
    {icon:'💧', label:'Water Today', value:`${waterTapped}L / ${d.waterTarget}L`, color:'#60B8D4'},
    {icon:'🍱', label:'Meals Ready', value:d.mealsReady, color:'#B88AE0'},
    {icon:'💰', label:'Saved This Week', value:`$${Number(d.moneySaved||0).toFixed(2)}`, color:'#5AC983',
      sub:'vs. eating out'},
    {icon:'🏕️', label:'Next Camp Trip', value: campDays !== null ? `${campDays} days` : 'Not set', color:T.orange,
      sub: d.nextCampDate ? new Date(d.nextCampDate).toLocaleDateString('en-AU',{day:'numeric',month:'short'}) : 'Tap Edit to set'},
    {icon:'⭐', label:'Recipes Saved', value:`${favs.length}`, color:T.orange},
  ];

  return (
    <div>
      {/* Greeting Hero */}
      <div style={{
        background:`linear-gradient(135deg,${T.orangeGlow} 0%,${T.surface} 60%)`,
        border:`1px solid ${T.orange}33`,borderRadius:18,padding:'28px 32px',marginBottom:22,
        position:'relative',overflow:'hidden',
      }}>
        <div style={{position:'absolute',right:20,top:'50%',transform:'translateY(-50%)',
          fontSize:120,opacity:0.04,pointerEvents:'none'}}>⚡</div>
        <div style={{fontSize:13,color:T.orange,fontWeight:700,letterSpacing:1,marginBottom:4}}>{greeting}</div>
        <div style={{fontSize:40,fontWeight:900,color:T.cream,letterSpacing:'-1.5px',lineHeight:1,marginBottom:8}}>
          Ethan 👋
        </div>
        <div style={{fontSize:14,color:T.muted,marginBottom:16}}>
          {d.mealPrepStreak}-day streak. {Number(d.proteinToday)>=Number(d.proteinTarget)?'Protein target hit! 💪':'Protein target not hit yet today.'}
          {d.notes && <span style={{display:'block',marginTop:4,color:T.cream,fontStyle:'italic'}}>"{d.notes}"</span>}
        </div>
        <button onClick={()=>{setDraft({...d});setEditing(true);}} style={{
          background:T.orange,border:'none',color:'#fff',borderRadius:8,
          padding:'9px 20px',cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:'inherit',
        }}>✏️ Update Dashboard</button>
      </div>

      {/* Edit Panel */}
      {editing && (
        <div style={{
          background:T.surface,border:`1px solid ${T.orange}`,borderRadius:16,
          padding:'22px 24px',marginBottom:22,
        }}>
          <div style={{fontSize:14,fontWeight:800,color:T.cream,marginBottom:16}}>
            ✏️ Update Your Stats
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:12,marginBottom:16}}>
            {[
              {k:'weight',l:'Weight (kg)',ph:'86',type:'number'},
              {k:'goalWeight',l:'Goal Weight (kg)',ph:'80',type:'number'},
              {k:'proteinToday',l:'Protein Today (g)',ph:'124',type:'number'},
              {k:'proteinTarget',l:'Protein Target (g)',ph:'180',type:'number'},
              {k:'caloriesToday',l:'Calories Today',ph:'1840',type:'number'},

              {k:'waterLitres',l:'Water Today (L)',ph:'1.5',type:'number'},
              {k:'waterTarget',l:'Water Target (L)',ph:'3',type:'number'},
              {k:'mealsReady',l:'Meals in Fridge',ph:'5',type:'number'},
              {k:'mealsReady',l:'Meals in Fridge RIGHT NOW',ph:'5',type:'number'},
              {k:'nextCampDate',l:'Next Camp Trip',ph:'',type:'date'},
            ].map(f=>(
              <div key={f.k}>
                <div style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:'uppercase',
                  letterSpacing:1,marginBottom:5}}>{f.l}</div>
                <input type={f.type} placeholder={f.ph} value={draft[f.k]}
                  onChange={e=>setDraft(p=>({...p,[f.k]:e.target.value}))}
                  style={{
                    background:T.elevated,border:`1px solid ${T.border}`,borderRadius:8,
                    color:T.cream,fontSize:13,padding:'9px 12px',fontFamily:'inherit',
                    width:'100%',outline:'none',
                  }}
                  onFocus={e=>e.target.style.borderColor=T.orange}
                  onBlur={e=>e.target.style.borderColor=T.border}
                />
              </div>
            ))}
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:'uppercase',
              letterSpacing:1,marginBottom:5}}>Dashboard Note (shows on greeting)</div>
            <input type="text" placeholder="e.g. Back day done. Feeling strong."
              value={draft.notes} onChange={e=>setDraft(p=>({...p,notes:e.target.value}))}
              style={{
                background:T.elevated,border:`1px solid ${T.border}`,borderRadius:8,
                color:T.cream,fontSize:13,padding:'9px 12px',fontFamily:'inherit',
                width:'100%',outline:'none',
              }}
              onFocus={e=>e.target.style.borderColor=T.orange}
              onBlur={e=>e.target.style.borderColor=T.border}
            />
          </div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={saveEdits} style={{
              background:T.orange,border:'none',color:'#fff',borderRadius:8,
              padding:'10px 24px',cursor:'pointer',fontSize:14,fontWeight:700,fontFamily:'inherit',
            }}>💾 Save</button>
            <button onClick={()=>setEditing(false)} style={{
              background:'transparent',border:`1px solid ${T.border}`,color:T.muted,
              borderRadius:8,padding:'10px 18px',cursor:'pointer',fontSize:13,fontFamily:'inherit',
            }}>Cancel</button>
          </div>
        </div>
      )}
      {saved && (
        <div style={{background:T.greenBg,border:`1px solid ${T.green}55`,borderRadius:10,
          padding:'10px 16px',marginBottom:16,fontSize:13,color:'#5AC983',fontWeight:600}}>
          ✅ Dashboard updated!
        </div>
      )}

      {/* Stat Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:12,marginBottom:24}}>
        {statCards.map((s,i)=>(
          <div key={i} style={{
            background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,
            padding:'16px 18px',borderLeft:`3px solid ${s.color}`,
            transition:'transform 0.15s',
          }}
          onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'}
          onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'}>
            <div style={{fontSize:22,marginBottom:8}}>{s.icon}</div>
            <div style={{fontSize:24,fontWeight:900,color:s.color,fontFamily:'monospace',marginBottom:2}}>
              {s.value}
            </div>
            <div style={{fontSize:11,color:T.muted,fontWeight:600,textTransform:'uppercase',letterSpacing:0.5}}>
              {s.label}
            </div>
            {s.sub&&<div style={{fontSize:10,color:T.dim,marginTop:3}}>{s.sub}</div>}
          </div>
        ))}
      </div>

      {/* Today's Targets */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,
        padding:'18px 22px',marginBottom:24}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:T.orange,
          textTransform:'uppercase',marginBottom:14}}>Today's Targets</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:14}}>
          {[
            {label:'Protein',cur:Number(d.proteinToday),max:liveProtTarget,unit:'g',color:'#5AC983'},
            {label:'Calories',cur:Number(d.caloriesToday),max:liveCalTarget,unit:'kcal',color:T.orange},
            {label:'Water',cur:waterTapped,max:Number(d.waterTarget),unit:'L',color:'#60B8D4'},
          ].map(g=>(
            <div key={g.label}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                <span style={{fontSize:12,fontWeight:600,color:T.cream}}>{g.label}</span>
                <span style={{fontSize:11,color:T.muted,fontFamily:'monospace'}}>
                  {g.cur}/{g.max}{g.unit}
                </span>
              </div>
              <div style={{height:6,background:T.border,borderRadius:3,overflow:'hidden'}}>
                <div style={{
                  height:'100%',
                  width:`${Math.min(100,g.max>0?(g.cur/g.max)*100:0)}%`,
                  background:g.color,borderRadius:3,transition:'width 0.8s ease',
                }} />
              </div>
            </div>
          ))}
        </div>

        {/* Water quick-tapper */}
        <div style={{marginTop:16}}>
          <div style={{fontSize:11,color:T.muted,fontWeight:600,marginBottom:8}}>
            💧 Tap to log water - {waterTapped}L / {d.waterTarget}L target
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {Array.from({length:Number(d.waterTarget)*4||12},(_,i)=>i+1).map(n=>{
              const litres = n * 0.25;
              const filled = litres <= waterTapped;
              return (
                <button key={n} onClick={()=>setWaterTapped(Math.round(litres*100)/100)} style={{
                  width:36,height:36,borderRadius:'50%',
                  background:filled?'#60B8D4':T.elevated,
                  border:`2px solid ${filled?'#60B8D4':T.border}`,
                  fontSize:14,cursor:'pointer',transition:'all 0.15s',
                  display:'flex',alignItems:'center',justifyContent:'center',
                }}>💧</button>
              );
            })}
          </div>
        </div>
      </div>

      {/* Today's Logged Meals */}
      {loggedMeals && loggedMeals.filter(m=>new Date(m.loggedAt).toDateString()===new Date().toDateString()).length>0 && (
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,padding:'18px 22px',marginBottom:24}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:T.orange,textTransform:'uppercase',marginBottom:12}}>
            Today's Meals
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {loggedMeals.filter(m=>new Date(m.loggedAt).toDateString()===new Date().toDateString()).map((m,i)=>(
              <div key={i} style={{
                display:'flex',alignItems:'center',gap:12,
                background:T.elevated,borderRadius:10,padding:'10px 14px',
                border:`1px solid ${T.border}`,
              }}>
                <span style={{fontSize:22}}>{m.emoji}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:T.cream}}>{m.name}</div>
                  <div style={{fontSize:11,color:T.muted}}>logged at {m.time}</div>
                </div>
                <div style={{textAlign:'right',marginRight:8}}>
                  <div style={{fontSize:13,fontWeight:700,color:'#5AC983'}}>+{m.protein}g protein</div>
                  <div style={{fontSize:11,color:T.muted}}>{m.calories} kcal</div>
                </div>
                <button onClick={()=>removeLoggedMeal&&removeLoggedMeal(m)} style={{
                  background:'rgba(155,55,55,0.2)',border:'1px solid rgba(155,55,55,0.3)',
                  color:'#F08080',borderRadius:7,width:28,height:28,
                  cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',
                  justifyContent:'center',flexShrink:0,
                }}>✕</button>
              </div>
            ))}
          </div>
          <div style={{
            marginTop:12,padding:'10px 14px',background:T.orangeDim,
            borderRadius:10,border:`1px solid ${T.orange}33`,
            display:'flex',justifyContent:'space-between',
          }}>
            <span style={{fontSize:13,fontWeight:700,color:T.cream}}>Total Today</span>
            <span style={{fontSize:13,fontWeight:700,color:T.orange}}>
              {loggedMeals.filter(m=>new Date(m.loggedAt).toDateString()===new Date().toDateString()).reduce((s,m)=>s+m.protein,0)}g protein · {loggedMeals.filter(m=>new Date(m.loggedAt).toDateString()===new Date().toDateString()).reduce((s,m)=>s+m.calories,0)} kcal
            </span>
          </div>
        </div>
      )}

      {/* Chapter Nav */}
      <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:T.muted,
        textTransform:'uppercase',marginBottom:12}}>Chapters</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:10,marginBottom:28}}>
        {CHAPTERS.map(ch=>{
          const count=RECIPES.filter(r=>r.chapter===ch.id).length;
          return (
            <button key={ch.id} onClick={()=>onNav(ch.id)} style={{
              background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,
              padding:'16px 12px',cursor:'pointer',transition:'all 0.15s',
              textAlign:'center',color:T.cream,fontFamily:'inherit',
            }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=ch.color;e.currentTarget.style.background=`${ch.color}12`;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.background=T.surface;}}>
              <div style={{fontSize:26,marginBottom:7}}>{ch.icon}</div>
              <div style={{fontSize:12,fontWeight:700,marginBottom:3}}>{ch.label}</div>
              <div style={{fontSize:11,color:T.muted}}>{count} recipes</div>
            </button>
          );
        })}
      </div>

      {/* Top Protein Recipes */}
      <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:T.muted,
        textTransform:'uppercase',marginBottom:12}}>Highest Protein</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:12}}>
        {topRecipes.map(r=>(
          <div key={r.id} style={{background:T.surface,border:`1px solid ${T.border}`,
            borderRadius:12,padding:'12px 14px',display:'flex',gap:12,alignItems:'center'}}>
            <div style={{width:48,height:48,borderRadius:10,background:T.elevated,overflow:'hidden',
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>
              {r.photo
                ?<img src={r.photo} style={{width:'100%',height:'100%',objectFit:'cover'}}
                    onError={e=>{e.target.style.display='none'}} alt="" />
                :r.emoji}
            </div>

const RecipesPage = ({chapter,favs,onFavToggle,onShopAdd,onLogMeal,loggedMeals=[]}) => {
  const [open,setOpen]=useState(null);
  const [search,setSearch]=useState('');
  const [filters,setFilters]=useState([]);
  const [sort,setSort]=useState('default');
  const ch=chapter?CHAPTERS.find(c=>c.id===chapter):null;
  const base=chapter?RECIPES.filter(r=>r.chapter===chapter):RECIPES;

  const filtered=useMemo(()=>{
    let res=search?RECIPES.filter(r=>
      r.name.toLowerCase().includes(search.toLowerCase())||
      r.tags.some(t=>t.includes(search.toLowerCase()))||
      r.desc.toLowerCase().includes(search.toLowerCase())||
      r.goodFor.some(g=>g.toLowerCase().includes(search.toLowerCase()))
    ):base;
    if(chapter&&search)res=res.filter(r=>r.chapter===chapter);
    if(filters.includes('high-protein'))res=res.filter(r=>r.macros.protein>=40);
    if(filters.includes('under5'))res=res.filter(r=>r.cost<5);
    if(filters.includes('quick'))res=res.filter(r=>r.prep+r.cook<=20);
    if(filters.includes('meal-prep'))res=res.filter(r=>r.mealPrep>=4);
    if(filters.includes('camping'))res=res.filter(r=>r.camping>=4);
    if(filters.includes('freeze'))res=res.filter(r=>r.freeze);
    if(filters.includes('faves'))res=res.filter(r=>favs.includes(r.id));
    if(sort==='protein')res=[...res].sort((a,b)=>b.macros.protein-a.macros.protein);
    if(sort==='cost')res=[...res].sort((a,b)=>a.cost-b.cost);
    if(sort==='quick')res=[...res].sort((a,b)=>(a.prep+a.cook)-(b.prep+b.cook));
    if(sort==='rating')res=[...res].sort((a,b)=>b.rating-a.rating);
    return res;
  },[search,filters,sort,chapter,base,favs]);

  const toggleF=(f)=>setFilters(p=>p.includes(f)?p.filter(x=>x!==f):[...p,f]);

  return (
    <div>
      {ch&&(
        <div style={{
          background:`linear-gradient(135deg,${ch.color}20 0%,${T.surface} 100%)`,
          border:`1px solid ${ch.color}44`,borderRadius:16,padding:'28px 32px',marginBottom:24,
          position:'relative',overflow:'hidden',
        }}>
          <div style={{position:'absolute',right:20,top:'50%',transform:'translateY(-50%)',
            fontSize:90,opacity:0.07}}>{ch.icon}</div>
          <div style={{fontSize:10,color:ch.color,fontWeight:700,letterSpacing:2,
            textTransform:'uppercase',marginBottom:5}}>{ch.icon} Chapter</div>
          <div style={{fontSize:'clamp(28px,5vw,40px)',fontWeight:900,color:T.cream,
            letterSpacing:'-1px',marginBottom:6}}>{ch.label}</div>
          <div style={{fontSize:13,color:T.muted}}>
            {RECIPES.filter(r=>r.chapter===chapter).length} recipes
          </div>
        </div>
      )}

      {/* Search */}
      <Input placeholder="🔍  Search by name, ingredient, goal..." value={search}
        onChange={e=>setSearch(e.target.value)} style={{marginBottom:12}} />

      {/* Filters */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10,alignItems:'center'}}>
        {[
          ['high-protein','💪 High Protein'],
          ['under5','💰 Under $5'],
          ['quick','⚡ Under 20 min'],
          ['meal-prep','🍱 Meal Prep'],
          ['camping','🏕️ Camp Ready'],
          ['freeze','🥶 Freezer'],
          ['faves','♥ Saved'],
        ].map(([id,lbl])=>(
          <button key={id} onClick={()=>toggleF(id)} style={{
            background:filters.includes(id)?T.orangeDim:T.surface,
            border:`1px solid ${filters.includes(id)?T.orange:T.border}`,
            color:filters.includes(id)?T.orange:T.muted,
            borderRadius:100,padding:'6px 13px',fontSize:11,fontWeight:600,
            cursor:'pointer',fontFamily:'inherit',transition:'all 0.15s',whiteSpace:'nowrap',
          }}>{lbl}</button>
        ))}
        <div style={{marginLeft:'auto',display:'flex',gap:5}}>
          {[['default','Default'],['protein','Protein↑'],['cost','Cost↑'],['quick','Quickest'],['rating','Rating']].map(([v,l])=>(
            <button key={v} onClick={()=>setSort(v)} style={{
              background:sort===v?T.orangeDim:T.elevated,
              border:`1px solid ${sort===v?T.orange:T.border}`,
              color:sort===v?T.orange:T.muted,
              borderRadius:7,padding:'5px 10px',fontSize:11,fontWeight:600,
              cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',
            }}>{l}</button>
          ))}
        </div>
      </div>
      <div style={{fontSize:11,color:T.muted,marginBottom:18}}>
        {filtered.length} recipe{filtered.length!==1?'s':''}
        {(search||filters.length>0)&&' · filtered'}
      </div>

      {filtered.length===0?(
        <div style={{textAlign:'center',padding:'60px 20px',color:T.muted}}>
          <div style={{fontSize:48,marginBottom:12}}>🔍</div>
          <div style={{fontSize:18,fontWeight:700,color:T.cream,marginBottom:8}}>No recipes found</div>
          <div>Try different search terms or remove some filters.</div>
        </div>
      ):(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(288px,1fr))',gap:18}}>
          {filtered.map(r=>(
            <RecipeCard key={r.id} recipe={r} onOpen={setOpen}
              onFavToggle={onFavToggle} isFav={favs.includes(r.id)} onShopAdd={onShopAdd}
              onLogMeal={onLogMeal} loggedMeals={loggedMeals} />

      {open&&<RecipeModal recipe={open} onClose={()=>setOpen(null)}
        onFavToggle={onFavToggle} isFav={favs.includes(open.id)} onShopAdd={onShopAdd} onLogMeal={onLogMeal} />}

const ProgressPage = ({entries,setEntries,dashData}) => {
  const [form,setForm]=useState({weight:'',waist:'',chest:'',arms:'',legs:'',bench:'',squat:'',deadlift:'',mood:'8',energy:'7',notes:''});
  const [saved,setSaved]=useState(false);
  const [tab,setTab]=useState('body'); // body | nutrition

  const save=()=>{
    if(form.weight){
      const entry={date:new Date().toISOString().split('T')[0],
        ...Object.fromEntries(Object.entries(form).map(([k,v])=>[k,isNaN(v)?v:Number(v)]))};
      setEntries(p=>[...p,entry]);
      setSaved(true);
      setTimeout(()=>setSaved(false),2000);
    }
  };

  const latest=entries[entries.length-1]||{};
  const prev=entries[entries.length-2]||{};
  const weightDiff=latest.weight&&prev.weight?(latest.weight-prev.weight).toFixed(1):null;
  const goal=LS.get('portionGoal',{calories:'2000',protein:'180'});

  // Nutrition analytics from loggedMeals history
  const allMeals=LS.get('loggedMeals',[]);
  const now=new Date();
  const todayStr=now.toDateString();
  const weekAgo=new Date(now-7*24*3600*1000);
  const monthAgo=new Date(now-30*24*3600*1000);

  const mealsToday=allMeals.filter(m=>new Date(m.loggedAt).toDateString()===todayStr);
  const mealsWeek=allMeals.filter(m=>new Date(m.loggedAt)>=weekAgo);
  const mealsMonth=allMeals.filter(m=>new Date(m.loggedAt)>=monthAgo);

  const sum=(arr,key)=>arr.reduce((s,m)=>s+(m[key]||0),0);
  const avg=(arr,key,days)=>arr.length?Math.round(sum(arr,key)/days):0;

  const todayCals=Number(dashData?.caloriesToday||0);
  const todayProt=Number(dashData?.proteinToday||0);
  const todayWater=Number(LS.get('waterTapped',0));

  const weekAvgCals=avg(mealsWeek,'calories',7);
  const weekAvgProt=avg(mealsWeek,'protein',7);
  const monthAvgCals=avg(mealsMonth,'calories',30);
  const monthAvgProt=avg(mealsMonth,'protein',30);

  // Weight entries for graphs
  const weightEntries=entries.filter(e=>e.weight).map(e=>({
    ...e, date:new Date(e.date)
  }));
  const weeklyWeights=weightEntries.filter(e=>e.date>=weekAgo);
  const monthlyWeights=weightEntries.filter(e=>e.date>=monthAgo);

  return (
    <div>
      <div style={{fontSize:28,fontWeight:900,color:T.cream,marginBottom:6}}>Progress</div>

        background:T.surface,borderRadius:10,border:'1px solid '+T.border,overflow:'hidden'}}>

          <button key={val} onClick={()=>setTab(val)} style={{
            flex:1,background:tab===val?T.orange:'transparent',
            border:'none',color:tab===val?'#fff':T.muted,
            padding:'11px',cursor:'pointer',fontSize:13,fontWeight:700,
            fontFamily:'inherit',transition:'all 0.2s',
          }}>{lbl}</button>
        ))}
      </div>

      {tab==='body'&&(<div>
      {/* Summary Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:12,marginBottom:22}}>
        {[
          {icon:'⚖️',label:'Current Weight',val:latest.weight?latest.weight+'kg':'-',color:T.orange,
            sub:weightDiff?(weightDiff<0?'▼ ':'▲ ')+Math.abs(weightDiff)+'kg from last entry':''},
          {icon:'🎯',label:'Goal Weight',val:LS.get('portionGoal',{goalWeight:'-'}).goalWeight?LS.get('portionGoal',{}).goalWeight+'kg':'-',color:'#60B8D4'},
          {icon:'🏋️',label:'Bench 1RM',val:latest.bench?latest.bench+'kg':'-',color:'#5AC983'},
          {icon:'🦵',label:'Squat 1RM',val:latest.squat?latest.squat+'kg':'-',color:'#B88AE0'},
          {icon:'💀',label:'Deadlift 1RM',val:latest.deadlift?latest.deadlift+'kg':'-',color:'#60B8D4'},
          {icon:'📅',label:'Entries Logged',val:entries.length||'-',color:T.orange},
        ].map((s,i)=>(

const PortionCalcPage = ({dashData}) => {
  const [goal, setGoal] = useState(()=>LS.get('portionGoal',{
    calories:'2000', protein:'180', meals:'5', deficitTarget:'500',
    weight:'86', goalWeight:'80', bmr:'', tdee:'', activityLevel:'moderate',
  }));
  const [saved, setSaved] = useState(false);

  const saveGoal = () => {
    const goalWithDeficit = {...goal, calories: String(deficitCals)};
    LS.set('portionGoal', goalWithDeficit);
    // Sync calorie target to dashboard
    const currentDash = LS.get('dashData', {});
    LS.set('dashData', {...currentDash, calorieTarget: String(deficitCals), proteinToday: currentDash.proteinToday||'0'});
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };

  // Activity multipliers
  const activityMult = {sedentary:1.2, light:1.375, moderate:1.55, active:1.725, very:1.9};
  const activityLabels = {sedentary:'Desk job, no exercise', light:'Light exercise 1-3x/week',
    moderate:'Moderate exercise 3-5x/week (tradie + gym)', active:'Hard exercise 6-7x/week', very:'Physical job + hard training'};

  // Auto-calculate BMR (Mifflin-St Jeor for males)
  const w = Number(goal.weight||86);
  const bmr = Math.round(10*w + 6.25*175 - 5*28 + 5); // height 175cm, age 28 estimate
  const tdee = Math.round(bmr * (activityMult[goal.activityLevel]||1.55));
  const deficitCals = tdee - Number(goal.deficitTarget||500);
  const proteinCals = Number(goal.protein||180) * 4;
  const fatCals = Math.round(deficitCals * 0.25);
  const carbCals = deficitCals - proteinCals - fatCals;
  const carbsG = Math.round(carbCals / 4);
  const fatG = Math.round(fatCals / 9);
  const calsPerMeal = Math.round(deficitCals / Number(goal.meals||5));
  const proteinPerMeal = Math.round(Number(goal.protein||180) / Number(goal.meals||5));

  // Per-100g calculator for batch recipes
  const [batchRecipe, setBatchRecipe] = useState('');
  const [batchWeight, setBatchWeight] = useState('');
  const [batchServings, setBatchServings] = useState('');
  const selectedRecipe = RECIPES.find(r=>r.id===batchRecipe);

  // Calculate grams per scoop
  let gramsPerServe = null;
  let calsPerGram = null;
  if(selectedRecipe && batchWeight && batchServings) {
    const totalWeight = Number(batchWeight);
    const totalServings = Number(batchServings);
    gramsPerServe = Math.round(totalWeight / totalServings);
    calsPerGram = selectedRecipe.macros.calories / (totalWeight / totalServings);
    // How many grams to hit calorie target per meal
  }

  const gramsForTarget = (calsPerGram && calsPerMeal) ? Math.round(calsPerMeal / calsPerGram) : null;

  return (
    <div>
      <div style={{background:`linear-gradient(135deg,${T.orangeDim},${T.surface})`,
        border:`1px solid ${T.orange}44`,borderRadius:16,padding:'28px',marginBottom:24}}>

          textTransform:'uppercase',marginBottom:6}}>Nutrition Planning</div>

          Calorie Calculator
        </div>
        <div style={{fontSize:14,color:T.muted}}>
          Set your targets. Know exactly how much to scoop each morning.
        </div>
      </div>

      {/* Stats input */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:16,marginBottom:24}}>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:22}}>
          <div style={{fontSize:13,fontWeight:700,color:T.cream,marginBottom:14}}>Your Stats</div>
          {[
            {k:'weight',l:'Current weight (kg)',ph:'86'},
            {k:'goalWeight',l:'Goal weight (kg)',ph:'80'},
          ].map(f=>(
            <div key={f.k} style={{marginBottom:12}}>
              <div style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:'uppercase',

              <input type="number" placeholder={f.ph} value={goal[f.k]}
                onChange={e=>setGoal(p=>({...p,[f.k]:e.target.value}))}

                  color:T.cream,fontSize:14,padding:'9px 12px',fontFamily:'inherit',width:'100%',outline:'none'}}

                onBlur={e=>e.target.style.borderColor=T.border}

          <div style={{marginBottom:12}}>

              letterSpacing:1,marginBottom:5}}>Activity Level</div>

    </div>
  );
};

const WeightGraph = ({entries}) => {
  if(entries.length<2) return (
    <div style={{textAlign:'center',padding:'28px',color:T.muted,fontSize:13}}>
      Log at least 2 weight entries to see your trend graph.
    </div>
  );
  const recent=entries.slice(-12);
  const weights=recent.map(e=>e.weight||0).filter(w=>w>0);
  if(weights.length<2) return null;
  const maxW=Math.max(...weights);
  const minW=Math.min(...weights);
  const range=maxW-minW||1;
  const W=300, H=100, pad=10;
  const pts=weights.map((w,i)=>{
    const x=pad+(i/(weights.length-1))*(W-pad*2);
    const y=H-pad-((w-minW)/range)*(H-pad*2);
    return [x,y];
  });
  const path='M '+pts.map(p=>p[0]+','+p[1]).join(' L ');
  const trend=weights[weights.length-1]-weights[0];
  return (
    <div style={{background:T.surface,border:'1px solid '+T.border,borderRadius:16,
      padding:'20px 22px',marginBottom:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{fontSize:11,color:T.muted,fontWeight:700,letterSpacing:2,textTransform:'uppercase'}}>
          Weight Trend
        </div>
        <div style={{fontSize:13,fontWeight:700,color:trend<0?'#5AC983':T.red}}>
          {trend<0?'▼':'▲'} {Math.abs(trend).toFixed(1)}kg
        </div>
      </div>
      <svg width="100%" viewBox={'0 0 '+W+' '+H} style={{overflow:'visible'}}>
        <defs>
          <linearGradient id="wgrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={T.orange} stopOpacity="0.3"/>
            <stop offset="100%" stopColor={T.orange} stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d={path+' L '+pts[pts.length-1][0]+','+H+' L '+pts[0][0]+','+H+' Z'}
          fill="url(#wgrad)"/>
        <path d={path} fill="none" stroke={T.orange} strokeWidth="2.5" strokeLinecap="round"/>
        {pts.map((p,i)=>(
          <circle key={i} cx={p[0]} cy={p[1]} r="4" fill={T.orange}/>
        ))}
      </svg>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:8}}>
        <span style={{fontSize:10,color:T.muted}}>
          {recent[0]&&new Date(recent[0].date).toLocaleDateString('en-AU',{day:'numeric',month:'short'})}
        </span>
        <span style={{fontSize:10,color:T.muted}}>Today</span>
      </div>
    </div>
  );
};

const RestTimer = ({onClose}) => {
  const [secs, setSecs] = useState(90);
  const [running, setRunning] = useState(true);
  useEffect(()=>{
    if(!running) return;
    if(secs<=0){ setRunning(false); return; }
    const t=setTimeout(()=>setSecs(s=>s-1),1000);
    return ()=>clearTimeout(t);
  },[secs,running]);
  const pct=secs/90;
  const m=Math.floor(secs/60);
  const s=secs%60;
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:800,
      display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(6px)'}}>
      <div style={{background:T.surface,border:'1px solid '+T.border,borderRadius:20,
        padding:'32px',textAlign:'center',width:280}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:T.orange,
          textTransform:'uppercase',marginBottom:16}}>Rest Timer</div>
        <div style={{position:'relative',width:160,height:160,margin:'0 auto 20px'}}>
          <svg width="160" height="160" style={{transform:'rotate(-90deg)'}}>
            <circle cx="80" cy="80" r="70" fill="none" stroke={T.border} strokeWidth="8"/>
            <circle cx="80" cy="80" r="70" fill="none" stroke={secs<=10?T.red:T.orange}
              strokeWidth="8" strokeLinecap="round"
              strokeDasharray={440} strokeDashoffset={440*(1-pct)}
              style={{transition:'stroke-dashoffset 1s linear'}}/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',
            justifyContent:'center',flexDirection:'column'}}>
            <div style={{fontSize:42,fontWeight:900,color:secs<=10?T.red:T.cream,
              fontFamily:'monospace'}}>{m}:{String(s).padStart(2,'0')}</div>
            <div style={{fontSize:11,color:T.muted}}>seconds</div>
          </div>
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'center'}}>
          {[60,90,120,180].map(t=>(
            <button key={t} onClick={()=>{setSecs(t);setRunning(true);}} style={{
              background:T.elevated,border:'1px solid '+T.border,color:T.muted,
              borderRadius:8,padding:'6px 10px',cursor:'pointer',fontSize:12,fontFamily:'inherit',
            }}>{t}s</button>
          ))}
        </div>
        <button onClick={onClose} style={{
          marginTop:16,width:'100%',background:T.orange,border:'none',color:'#fff',
          borderRadius:8,padding:'11px',cursor:'pointer',fontSize:14,fontWeight:700,fontFamily:'inherit',
        }}>Done</button>
      </div>
    </div>
  );
};

  const [done, setDone] = useState(saved.done||false);
  const [rpe, setRpe] = useState(saved.rpe||'');
  const [notes, setNotes] = useState(saved.notes||'');
  const [expanded, setExpanded] = useState(false);

  const w = parseFloat(weight)||0;
  const r = parseFloat(reps)||0;
  const vol = Math.round(w * r * ex.sets);
  const orm = w>0&&r>0 ? Math.round(w*(1+r/30)) : 0;
  const isPB = w > 0 && w > (parseFloat(pb.weight)||0);

  const save = () => {
    const entry = {weight,reps,done,rpe,notes};
    onUpdate(key, entry);
    if(w>0&&r>0){
      LS.set('gymPrev-'+ex.id, {weight,reps,date:new Date().toLocaleDateString('en-AU')});
      if(isPB) LS.set('gymPB-'+ex.id, {weight:w, date:new Date().toLocaleDateString('en-AU')});
      // Save to history
      const hist = LS.get('gymHist-'+ex.id, []);
      hist.push({date:Date.now(),weight:w,reps:r,sets:ex.sets,orm,vol:w*r*ex.sets});
      LS.set('gymHist-'+ex.id, hist.slice(-52));
    }
  };

  return (
    <div style={{background:T.elevated,border:'1px solid '+(done?T.green+'55':T.border),
      borderRadius:12,marginBottom:10,overflow:'hidden',
      transition:'border-color 0.2s',}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',cursor:'pointer'}}
        onClick={()=>setExpanded(e=>!e)}>
        <button onClick={e=>{e.stopPropagation();setDone(d=>!d);setTimeout(save,100);}} style={{
          width:26,height:26,borderRadius:'50%',
          background:done?T.green:'transparent',
          border:'2px solid '+(done?T.green:T.steel),
          cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',
          flexShrink:0,transition:'all 0.15s',
        }}>{done?'✓':''}</button>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700,color:done?T.muted:T.cream,
            textDecoration:done?'line-through':'none'}}>{ex.name}</div>
          <div style={{fontSize:11,color:T.muted}}>{ex.muscle} · {ex.sets} sets · {ex.reps} reps</div>
        </div>
        {isPB&&w>0&&<div style={{fontSize:10,fontWeight:700,color:'#FFD700',
          background:'rgba(255,215,0,0.15)',border:'1px solid rgba(255,215,0,0.3)',
          borderRadius:6,padding:'2px 8px'}}>🏆 PB!</div>}
        {prev.weight&&<div style={{fontSize:11,color:T.muted,textAlign:'right',flexShrink:0}}>
          <div>Last: {prev.weight}kg</div>
          <div style={{fontSize:10}}>{prev.date}</div>
        </div>}
        <div style={{color:T.muted,fontSize:14}}>{expanded?'▲':'▼'}</div>
      </div>

      {/* Expanded input */}
      {expanded&&(
        <div style={{padding:'0 14px 14px',borderTop:'1px solid '+T.border}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10,marginTop:12}}>
            {[
              {label:'Weight (kg)',val:weight,set:setWeight,ph:'e.g. 80'},
              {label:'Reps done',val:reps,set:setReps,ph:ex.reps},
              {label:'RPE (1-10)',val:rpe,set:setRpe,ph:'e.g. 8'},
            ].map(f=>(
              <div key={f.label}>
                <div style={{fontSize:9,fontWeight:700,color:T.muted,textTransform:'uppercase',
                  letterSpacing:1,marginBottom:4}}>{f.label}</div>
                <input type="number" placeholder={f.ph} value={f.val}
                  onChange={e=>{f.set(e.target.value);}}
                  onBlur={save}
                  style={{background:T.surface,border:'1px solid '+T.border,borderRadius:7,
                    color:T.cream,fontSize:13,padding:'7px 10px',fontFamily:'inherit',
                    width:'100%',outline:'none'}}
                  onFocus={e=>e.target.style.borderColor=T.orange}
                />
              </div>
            ))}
          </div>
          {vol>0&&(
            <div style={{display:'flex',gap:12,marginBottom:10,flexWrap:'wrap'}}>
              <div style={{background:T.surface,borderRadius:8,padding:'6px 12px',fontSize:12}}>
                <span style={{color:T.muted}}>Volume: </span>
                <strong style={{color:T.orange}}>{vol.toLocaleString()}kg</strong>
              </div>
              {orm>0&&<div style={{background:T.surface,borderRadius:8,padding:'6px 12px',fontSize:12}}>
                <span style={{color:T.muted}}>Est 1RM: </span>
                <strong style={{color:'#5AC983'}}>{orm}kg</strong>
              </div>}
              {isPB&&<div style={{background:'rgba(255,215,0,0.1)',borderRadius:8,
                padding:'6px 12px',fontSize:12,color:'#FFD700',fontWeight:700}}>
                🏆 New Personal Best!
              </div>}
            </div>
          )}
          <textarea placeholder="Notes..." value={notes}
            onChange={e=>setNotes(e.target.value)} onBlur={save}
            style={{width:'100%',background:T.surface,border:'1px solid '+T.border,
              borderRadius:7,color:T.cream,fontSize:12,padding:'7px 10px',
              fontFamily:'inherit',resize:'none',height:50,outline:'none'}}/>
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <button onClick={()=>onTimer()} style={{
              background:T.orangeDim,border:'1px solid '+T.orange+'55',color:T.orange,
              borderRadius:7,padding:'7px 14px',cursor:'pointer',fontSize:12,fontWeight:700,
              fontFamily:'inherit',
            }}>⏱ Rest Timer</button>
          </div>
        </div>
      )}
    </div>
  );
};

const GymPage = () => {
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const todayName = days[new Date().getDay()===0?6:new Date().getDay()-1];
  const [activeDay, setActiveDay] = useState(todayName);
  const [view, setView] = useState('workout'); // workout | split | history | edit
  const [sessionData, setSessionData] = useState(()=>LS.get('gymSession-'+activeDay,{}));
  const [showTimer, setShowTimer] = useState(false);
  const [workoutStart] = useState(Date.now());
  const [elapsed, setElapsed] = useState(0);
  const [historyEx, setHistoryEx] = useState(null);

  // Editable workout plan - loads custom plan if saved, otherwise defaults
  const [weeklySplit, setWeeklySplit] = useState(()=>LS.get('customSplit', DEFAULT_WEEKLY_SPLIT));
  const [workouts, setWorkouts] = useState(()=>LS.get('customWorkouts', DEFAULT_WORKOUTS));
  const [editDay, setEditDay] = useState(null);
  const [newExName, setNewExName] = useState('');
  const [newExMuscle, setNewExMuscle] = useState('');
  const [newExSets, setNewExSets] = useState('3');
  const [newExReps, setNewExReps] = useState('10-12');

  useEffect(()=>{
    setSessionData(LS.get('gymSession-'+activeDay,{}));
  },[activeDay]);

  useEffect(()=>{
    const t=setInterval(()=>setElapsed(Math.floor((Date.now()-workoutStart)/60000)),30000);
    return ()=>clearInterval(t);
  },[workoutStart]);

  const updateSession = (key, val) => {
    setSessionData(prev=>{
      const next={...prev,[key]:val};
      LS.set('gymSession-'+activeDay, next);
      return next;
    });
  };

  const saveWorkouts = (next) => {
    setWorkouts(next);
    LS.set('customWorkouts', next);
  };

  const saveSplit = (next) => {
    setWeeklySplit(next);
    LS.set('customSplit', next);
  };

  const updateFocus = (day, newFocus) => {
    saveSplit(weeklySplit.map(s=>s.day===day?{...s,focus:newFocus}:s));
  };

  const addExercise = (day) => {
    if(!newExName.trim()) return;
    const id = newExName.toLowerCase().replace(/[^a-z0-9]+/g,'-')+'-'+Date.now();
    const newEx = {id, name:newExName.trim(), muscle:newExMuscle.trim()||'General',
      sets:Number(newExSets)||3, reps:newExReps||'10-12', notes:''};
    saveWorkouts({...workouts, [day]:[...(workouts[day]||[]), newEx]});
    setNewExName(''); setNewExMuscle(''); setNewExSets('3'); setNewExReps('10-12');
  };

  const removeExercise = (day, exId) => {
    saveWorkouts({...workouts, [day]:(workouts[day]||[]).filter(e=>e.id!==exId)});
  };

  const moveExercise = (day, idx, dir) => {
    const list=[...(workouts[day]||[])];
    const newIdx=idx+dir;
    if(newIdx<0||newIdx>=list.length) return;
    [list[idx],list[newIdx]]=[list[newIdx],list[idx]];
    saveWorkouts({...workouts, [day]:list});
  };

  const resetToDefaults = () => {
    saveSplit(DEFAULT_WEEKLY_SPLIT);
    saveWorkouts(DEFAULT_WORKOUTS);
  };

  const exercises = workouts[activeDay]||[];
  const completed = exercises.filter(ex=>sessionData[activeDay+'-'+ex.id]?.done).length;
  const split = weeklySplit.find(s=>s.day===activeDay)||weeklySplit[0];

  // Edit mode view
  if(view==='edit'){
    const day = editDay || activeDay;
    const dayExercises = workouts[day]||[];
    const daySplit = weeklySplit.find(s=>s.day===day);
    return (
      <div>
        <button onClick={()=>setView('workout')} style={{
          background:'none',border:'none',color:T.orange,cursor:'pointer',
          fontSize:14,fontWeight:700,fontFamily:'inherit',marginBottom:16,padding:0,
        }}>← Back to Workout</button>

        <div style={{background:T.surface,border:'1px solid '+T.border,borderRadius:16,
          padding:'20px 22px',marginBottom:20}}>
          <div style={{fontSize:11,color:T.orange,fontWeight:700,letterSpacing:2,
            textTransform:'uppercase',marginBottom:12}}>Edit Workout Plan</div>

          {/* Day picker for editing */}
          <div style={{display:'flex',gap:4,marginBottom:16,overflowX:'auto',paddingBottom:4}}>
            {days.map(d=>(
              <button key={d} onClick={()=>setEditDay(d)} style={{
                flexShrink:0,background:day===d?T.orange:T.elevated,
                border:'1px solid '+(day===d?T.orange:T.border),
                color:day===d?'#fff':T.muted,borderRadius:8,padding:'7px 12px',
                cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'inherit',
              }}>{d.slice(0,3)}</button>
            ))}
          </div>

          {/* Focus name editor */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:'uppercase',
              letterSpacing:1,marginBottom:6}}>Day Focus / Split Name</div>
            <input type="text" value={daySplit?.focus||''}
              onChange={e=>updateFocus(day,e.target.value)}
              placeholder="e.g. Chest + Triceps"
              style={{width:'100%',background:T.elevated,border:'1px solid '+T.border,
                borderRadius:8,color:T.cream,fontSize:14,padding:'10px 12px',
                fontFamily:'inherit',outline:'none'}}
              onFocus={e=>e.target.style.borderColor=T.orange}
              onBlur={e=>e.target.style.borderColor=T.border}
            />
          </div>

          {/* Existing exercises - editable list */}
          <div style={{fontSize:11,fontWeight:700,color:T.muted,textTransform:'uppercase',
            letterSpacing:1,marginBottom:10}}>Exercises ({dayExercises.length})</div>
          {dayExercises.length===0?(
            <div style={{textAlign:'center',padding:'20px',color:T.muted,fontSize:13}}>
              No exercises yet. Add one below.
