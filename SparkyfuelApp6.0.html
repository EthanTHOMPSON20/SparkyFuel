        var src = document.getElementById('app-src').textContent;

        console.error(e);

}, function(){ showError('Failed to load React.'); });

const Tag = ({children, color=T.orange, active=false}) => (
  <span style={{
    fontSize:10,fontWeight:700,letterSpacing:0.5,textTransform:'uppercase',
    padding:'3px 9px',borderRadius:100,whiteSpace:'nowrap',
    background: active ? color : `${color}18`,
    color: active ? '#fff' : color,
    border:`1px solid ${color}33`,
  }}>{children}</span>
);

const StatBox = ({icon,value,label,color=T.cream,mono=false}) => (
  <div style={{
    background:T.elevated,border:`1px solid ${T.border}`,borderRadius:10,
    padding:'14px 16px',textAlign:'center',
  }}>
    <div style={{fontSize:20,marginBottom:6}}>{icon}</div>
    <div style={{
      fontSize:22,fontWeight:900,color,
      fontFamily: mono ? 'monospace' : 'inherit',
      letterSpacing: mono ? '-0.5px' : '-0.3px',
      marginBottom:3,
    }}>{value}</div>
    <div style={{fontSize:11,color:T.muted,fontWeight:600,textTransform:'uppercase',letterSpacing:0.5}}>{label}</div>
  </div>

const Btn = ({children,onClick,variant='primary',full=false,style={}}) => {
  const [hov,setHov] = useState(false);
  const styles = {
    primary:{background:hov?T.orangeHov:T.orange,color:'#fff',border:'none'},
    ghost:{background:'transparent',color:hov?T.cream:T.muted,border:`1px solid ${hov?T.border:T.dim}`},
    subtle:{background:hov?T.elevated:T.surface,color:T.cream,border:`1px solid ${T.border}`},
    success:{background:T.greenBg,color:'#5AC983',border:`1px solid ${T.green}55`},
    danger:{background:'rgba(155,55,55,0.15)',color:'#F08080',border:'1px solid rgba(155,55,55,0.3)'},
  };
  return (
    <button
      style={{
        ...styles[variant],borderRadius:8,padding:'10px 20px',
        fontFamily:'inherit',fontSize:13,fontWeight:700,cursor:'pointer',
        transition:'all 0.15s',letterSpacing:0.3,
        width:full?'100%':'auto',...style,
      }}
      onClick={onClick}
      onMouseEnter={()=>setHov(true)}
      onMouseLeave={()=>setHov(false)}
    >{children}</button>
  );
};

const Input = ({placeholder,value,onChange,style={},type='text',onKeyDown}) => (

          fontSize:120,opacity:0.04,pointerEvents:'none'}}>⚡</div>
        <div style={{fontSize:13,color:T.orange,fontWeight:700,letterSpacing:1,marginBottom:4}}>{greeting}</div>
        <div style={{fontSize:40,fontWeight:900,color:T.cream,letterSpacing:'-1.5px',lineHeight:1,marginBottom:8}}>
          Ethan \uD83D\uDC4B
        </div>
        <div style={{fontSize:14,color:T.muted,marginBottom:16}}>
          {d.mealPrepStreak}-day streak. {Number(d.proteinToday)>=Number(d.proteinTarget)?'Protein target hit! \uD83D\uDCAA':'Protein target not hit yet today.'}
          {d.notes && <span style={{display:'block',marginTop:4,color:T.cream,fontStyle:'italic'}}>"{d.notes}"</span>}
        </div>
        <button onClick={()=>{setDraft({...d});setEditing(true);}} style={{
          background:T.orange,border:'none',color:'#fff',borderRadius:8,

      {editing && (

          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:12,marginBottom:16}}>
            {[
              {k:'weight',l:'Weight (kg)',ph:'86',type:'number'},
              {k:'goalWeight',l:'Goal Weight (kg)',ph:'80',type:'number'},
              {k:'proteinToday',l:'Protein Today (g)',ph:'124',type:'number'},
              {k:'proteinTarget',l:'Protein Target (g)',ph:'180',type:'number'},
              {k:'caloriesToday',l:'Calories Today',ph:'1840',type:'number'},

                color:T.cream,fontSize:13,padding:'9px 12px',fontFamily:'inherit',
                width:'100%',outline:'none',

              onFocus={e=>e.target.style.borderColor=T.orange}

          <div style={{display:'flex',gap:10}}>
            <button onClick={saveEdits} style={{
              background:T.orange,border:'none',color:'#fff',borderRadius:8,
              padding:'10px 24px',cursor:'pointer',fontSize:14,fontWeight:700,fontFamily:'inherit',
            }}>\uD83D\uDCBE Save</button>
            <button onClick={()=>setEditing(false)} style={{
              background:'transparent',border:`1px solid ${T.border}`,color:T.muted,
              borderRadius:8,padding:'10px 18px',cursor:'pointer',fontSize:13,fontFamily:'inherit',
            }}>Cancel</button>
          </div>

      {saved && (
        <div style={{background:T.greenBg,border:`1px solid ${T.green}55`,borderRadius:10,
          padding:'10px 16px',marginBottom:16,fontSize:13,color:'#5AC983',fontWeight:600}}>
          ✅ Dashboard updated!
        </div>

      {/* Stat Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:12,marginBottom:24}}>
        {statCards.map((s,i)=>(
          <div key={i} style={{
            background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,
            padding:'16px 18px',borderLeft:`3px solid ${s.color}`,
            transition:'transform 0.15s',
          }}
          onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'}
          onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'}>
            <div style={{fontSize:22,marginBottom:8}}>{s.icon}</div>
            <div style={{fontSize:24,fontWeight:900,color:s.color,fontFamily:'monospace',marginBottom:2}}>
              {s.value}
            </div>
            <div style={{fontSize:11,color:T.muted,fontWeight:600,textTransform:'uppercase',letterSpacing:0.5}}>
              {s.label}
            </div>
            {s.sub&&<div style={{fontSize:10,color:T.dim,marginTop:3}}>{s.sub}</div>}
          </div>
        ))}
      </div>

      {/* Today's Targets */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,
        padding:'18px 22px',marginBottom:24}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:T.orange,
          textTransform:'uppercase',marginBottom:14}}>Today's Targets</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:14}}>
          {[
            {label:'Protein',cur:Number(d.proteinToday),max:Number(d.proteinTarget),unit:'g',color:'#5AC983'},
            {label:'Calories',cur:Number(d.caloriesToday),max:Number(d.calorieTarget),unit:'kcal',color:T.orange},
            {label:'Water',cur:waterTapped,max:Number(d.waterTarget),unit:'L',color:'#60B8D4'},
          ].map(g=>(
            <div key={g.label}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                <span style={{fontSize:12,fontWeight:600,color:T.cream}}>{g.label}</span>
                <span style={{fontSize:11,color:T.muted,fontFamily:'monospace'}}>
                  {g.cur}/{g.max}{g.unit}
                </span>
              </div>
              <div style={{height:6,background:T.border,borderRadius:3,overflow:'hidden'}}>
                <div style={{
                  height:'100%',
                  width:`${Math.min(100,g.max>0?(g.cur/g.max)*100:0)}%`,
                  background:g.color,borderRadius:3,transition:'width 0.8s ease',
                }} />
              </div>
            </div>
          ))}
        </div>

        {/* Water quick-tapper */}
        <div style={{marginTop:16}}>
          <div style={{fontSize:11,color:T.muted,fontWeight:600,marginBottom:8}}>
            \uD83D\uDCA7 Tap to log water - {waterTapped}L / {d.waterTarget}L target
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {Array.from({length:Number(d.waterTarget)*4||12},(_,i)=>i+1).map(n=>{
              const litres = n * 0.25;
              const filled = litres <= waterTapped;
              return (
                <button key={n} onClick={()=>setWaterTapped(Math.round(litres*100)/100)} style={{
                  width:36,height:36,borderRadius:'50%',
                  background:filled?'#60B8D4':T.elevated,
                  border:`2px solid ${filled?'#60B8D4':T.border}`,
                  fontSize:14,cursor:'pointer',transition:'all 0.15s',
                  display:'flex',alignItems:'center',justifyContent:'center',
                }}>\uD83D\uDCA7</button>
              );
            })}
          </div>
        </div>
      </div>

      {/* Chapter Nav */}
      <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:T.muted,
        textTransform:'uppercase',marginBottom:12}}>Chapters</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:10,marginBottom:28}}>
        {CHAPTERS.map(ch=>{
          const count=RECIPES.filter(r=>r.chapter===ch.id).length;
          return (
            <button key={ch.id} onClick={()=>onNav(ch.id)} style={{
              background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,
              padding:'16px 12px',cursor:'pointer',transition:'all 0.15s',
              textAlign:'center',color:T.cream,fontFamily:'inherit',
            }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=ch.color;e.currentTarget.style.background=`${ch.color}12`;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.background=T.surface;}}>
              <div style={{fontSize:26,marginBottom:7}}>{ch.icon}</div>
              <div style={{fontSize:12,fontWeight:700,marginBottom:3}}>{ch.label}</div>
              <div style={{fontSize:11,color:T.muted}}>{count} recipes</div>
            </button>
          );
        })}
      </div>

      {/* Top Protein Recipes */}
      <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:T.muted,
        textTransform:'uppercase',marginBottom:12}}>Highest Protein</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:12}}>
        {topRecipes.map(r=>(
          <div key={r.id} style={{background:T.surface,border:`1px solid ${T.border}`,
            borderRadius:12,padding:'12px 14px',display:'flex',gap:12,alignItems:'center'}}>
            <div style={{width:48,height:48,borderRadius:10,background:T.elevated,overflow:'hidden',
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>
              {r.photo
                ?<img src={r.photo} style={{width:'100%',height:'100%',objectFit:'cover'}}
                    onError={e=>{e.target.style.display='none'}} alt="" />
                :r.emoji}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:700,color:T.cream,marginBottom:4,
                overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}</div>
              <div style={{display:'flex',gap:6}}>
                <Tag color={T.orange}>\uD83D\uDCAA {r.macros.protein}g</Tag>
                <span style={{fontSize:11,color:T.muted}}>${r.cost.toFixed(2)}</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

const RecipesPage = ({chapter,favs,onFavToggle,onShopAdd}) => {
  const [open,setOpen]=useState(null);
  const [search,setSearch]=useState('');
  const [filters,setFilters]=useState([]);
  const [sort,setSort]=useState('default');
  const ch=chapter?CHAPTERS.find(c=>c.id===chapter):null;
  const base=chapter?RECIPES.filter(r=>r.chapter===chapter):RECIPES;

  const filtered=useMemo(()=>{
    let res=search?RECIPES.filter(r=>
      r.name.toLowerCase().includes(search.toLowerCase())||
      r.tags.some(t=>t.includes(search.toLowerCase()))||
      r.desc.toLowerCase().includes(search.toLowerCase())||
      r.goodFor.some(g=>g.toLowerCase().includes(search.toLowerCase()))
    ):base;
    if(chapter&&search)res=res.filter(r=>r.chapter===chapter);
    if(filters.includes('high-protein'))res=res.filter(r=>r.macros.protein>=40);
    if(filters.includes('under5'))res=res.filter(r=>r.cost<5);
    if(filters.includes('quick'))res=res.filter(r=>r.prep+r.cook<=20);
    if(filters.includes('meal-prep'))res=res.filter(r=>r.mealPrep>=4);
    if(filters.includes('camping'))res=res.filter(r=>r.camping>=4);
    if(filters.includes('freeze'))res=res.filter(r=>r.freeze);
    if(filters.includes('faves'))res=res.filter(r=>favs.includes(r.id));
    if(sort==='protein')res=[...res].sort((a,b)=>b.macros.protein-a.macros.protein);
    if(sort==='cost')res=[...res].sort((a,b)=>a.cost-b.cost);
    if(sort==='quick')res=[...res].sort((a,b)=>(a.prep+a.cook)-(b.prep+b.cook));
    if(sort==='rating')res=[...res].sort((a,b)=>b.rating-a.rating);
    return res;
  },[search,filters,sort,chapter,base,favs]);

  const toggleF=(f)=>setFilters(p=>p.includes(f)?p.filter(x=>x!==f):[...p,f]);

  return (
    <div>
      {ch&&(
        <div style={{
          background:`linear-gradient(135deg,${ch.color}20 0%,${T.surface} 100%)`,
          border:`1px solid ${ch.color}44`,borderRadius:16,padding:'28px 32px',marginBottom:24,
          position:'relative',overflow:'hidden',
        }}>
          <div style={{position:'absolute',right:20,top:'50%',transform:'translateY(-50%)',
            fontSize:90,opacity:0.07}}>{ch.icon}</div>
          <div style={{fontSize:10,color:ch.color,fontWeight:700,letterSpacing:2,
            textTransform:'uppercase',marginBottom:5}}>{ch.icon} Chapter</div>
          <div style={{fontSize:'clamp(28px,5vw,40px)',fontWeight:900,color:T.cream,
            letterSpacing:'-1px',marginBottom:6}}>{ch.label}</div>
          <div style={{fontSize:13,color:T.muted}}>
            {RECIPES.filter(r=>r.chapter===chapter).length} recipes
          </div>
        </div>
      )}

      {/* Search */}
      <Input placeholder="\uD83D\uDD0D  Search by name, ingredient, goal..." value={search}
        onChange={e=>setSearch(e.target.value)} style={{marginBottom:12}} />

      {/* Filters */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10,alignItems:'center'}}>
        {[
          ['high-protein','\uD83D\uDCAA High Protein'],
          ['under5','\uD83D\uDCB0 Under $5'],
          ['quick','⚡ Under 20 min'],
          ['meal-prep','\uD83C\uDF71 Meal Prep'],
          ['camping','\uD83C\uDFD5️ Camp Ready'],
          ['freeze','\uD83E\uDD76 Freezer'],
          ['faves','♥ Saved'],
        ].map(([id,lbl])=>(
          <button key={id} onClick={()=>toggleF(id)} style={{
            background:filters.includes(id)?T.orangeDim:T.surface,
            border:`1px solid ${filters.includes(id)?T.orange:T.border}`,
            color:filters.includes(id)?T.orange:T.muted,
            borderRadius:100,padding:'6px 13px',fontSize:11,fontWeight:600,
            cursor:'pointer',fontFamily:'inherit',transition:'all 0.15s',whiteSpace:'nowrap',
          }}>{lbl}</button>
        ))}
        <div style={{marginLeft:'auto',display:'flex',gap:5}}>
          {[['default','Default'],['protein','Protein↑'],['cost','Cost↑'],['quick','Quickest'],['rating','Rating']].map(([v,l])=>(
            <button key={v} onClick={()=>setSort(v)} style={{
              background:sort===v?T.orangeDim:T.elevated,
              border:`1px solid ${sort===v?T.orange:T.border}`,
              color:sort===v?T.orange:T.muted,
              borderRadius:7,padding:'5px 10px',fontSize:11,fontWeight:600,
              cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',
            }}>{l}</button>
          ))}
        </div>
      </div>
      <div style={{fontSize:11,color:T.muted,marginBottom:18}}>
        {filtered.length} recipe{filtered.length!==1?'s':''}
        {(search||filters.length>0)&&' · filtered'}
      </div>

      {filtered.length===0?(
        <div style={{textAlign:'center',padding:'60px 20px',color:T.muted}}>
          <div style={{fontSize:48,marginBottom:12}}>\uD83D\uDD0D</div>
          <div style={{fontSize:18,fontWeight:700,color:T.cream,marginBottom:8}}>No recipes found</div>
          <div>Try different search terms or remove some filters.</div>
        </div>
      ):(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(288px,1fr))',gap:18}}>
          {filtered.map(r=>(
            <RecipeCard key={r.id} recipe={r} onOpen={setOpen}
              onFavToggle={onFavToggle} isFav={favs.includes(r.id)} onShopAdd={onShopAdd} />
          ))}
        </div>
      )}

      {open&&<RecipeModal recipe={open} onClose={()=>setOpen(null)}
        onFavToggle={onFavToggle} isFav={favs.includes(open.id)} onShopAdd={onShopAdd} />}
    </div>
  );
};

const ShoppingPage = ({items,onToggle,onClear}) => {
  const [custom,setCustom]=useState('');
  const [extras,setExtras]=useState([]);
  const all=[...items,...extras];
  const done=all.filter(i=>i.checked).length;
  const pct=all.length>0?Math.round((done/all.length)*100):0;
  const totalEst=all.reduce((s,i)=>s+(i.cost||0),0);

  const addCustom=()=>{
    if(custom.trim()){
      setExtras(p=>[...p,{id:`x-${Date.now()}`,name:custom.trim(),checked:false}]);
      setCustom('');
    }
  };
  const toggleExtra=(id)=>setExtras(p=>p.map(e=>e.id===id?{...e,checked:!e.checked}:e));

  const STAPLES=['Chicken breast 2kg','Chicken thighs 1kg','Beef mince 1kg','Eggs 12-pack',
    'Greek yoghurt 1kg','Full fat milk 2L','Jasmine rice 2kg','Penne pasta 1kg',
    'Rolled oats 1kg','Flour tortillas','Canned tuna 4-pack','Crushed tomatoes 4-pack',
    'Black beans 2-pack','Baby spinach','Broccoli 2 heads','Cherry tomatoes',
    'Garlic bulb','Brown onions bag','Olive oil','Soy sauce','Honey jar','Peanut butter jar',
    'Parmesan block','Shredded cheese 500g','Sour cream','Thickened cream',
    'Frozen berries 1kg','Frozen peas/corn','Butter 500g','Protein powder'];

  return (
    <div>
      {/* Header */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,
        padding:'22px 24px',marginBottom:22}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
          <div>
            <div style={{fontSize:26,fontWeight:900,color:T.cream,marginBottom:4}}>Shopping List</div>
            <div style={{fontSize:13,color:T.muted}}>
              {done} of {all.length} items checked
              {totalEst>0&&<span style={{color:T.orange,marginLeft:8}}>· Est. ${totalEst.toFixed(2)}</span>}
            </div>
          </div>
          <Btn onClick={onClear} variant="ghost" style={{fontSize:11}}>Clear All</Btn>
        </div>
        <div style={{height:7,background:T.border,borderRadius:4,overflow:'hidden',marginBottom:6}}>
          <div style={{height:'100%',width:`${pct}%`,background:T.green,borderRadius:4,
            transition:'width 0.3s'}} />
        </div>
        <div style={{fontSize:11,color:T.muted}}>{pct}% complete</div>
      </div>

      {/* Add custom */}
      <div style={{display:'flex',gap:10,marginBottom:20}}>
        <Input placeholder="Add item manually..." value={custom}
          onChange={e=>setCustom(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&addCustom()}
          style={{flex:1}} />
        <Btn onClick={addCustom}>+ Add</Btn>
      </div>

      {/* Items */}
      {all.length===0?(
        <div style={{textAlign:'center',padding:'60px 20px',color:T.muted}}>
          <div style={{fontSize:48,marginBottom:12}}>\uD83D\uDED2</div>
          <div style={{fontSize:16,fontWeight:700,color:T.cream,marginBottom:8}}>List is empty</div>
          <div style={{fontSize:13}}>Open any recipe and tap "Add to Shopping List".</div>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:28}}>
          {all.map((item,idx)=>{
            const isExtra=!!item.id?.startsWith('x-');
            return (
              <div key={item.id||idx} style={{
                display:'flex',alignItems:'center',gap:11,
                background:T.surface,border:`1px solid ${item.checked?T.green+'44':T.border}`,
                borderRadius:10,padding:'10px 14px',transition:'all 0.15s',
              }}>
                <input type="checkbox" checked={!!item.checked}
                  onChange={()=>isExtra?toggleExtra(item.id):onToggle(item)}
                  style={{accentColor:T.green,width:16,height:16,cursor:'pointer'}} />
                <span style={{
                  flex:1,fontSize:13,color:item.checked?T.muted:T.cream,
                  textDecoration:item.checked?'line-through':'none',
                  fontWeight:item.checked?400:500,
                }}>{item.name}</span>
                {item.cost&&<span style={{fontSize:11,color:T.muted,fontFamily:'monospace'}}>
                  ${item.cost.toFixed(2)}</span>}
                {item.aldi&&<Tag color={T.green}>Aldi</Tag>}
              </div>
            );
          })}
        </div>
      )}

      {/* Aldi Staples */}
      <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:T.muted,
        textTransform:'uppercase',marginBottom:12}}>\uD83C\uDFEA Aldi Staples - Tap to Add</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:6}}>
        {STAPLES.map((s,i)=>(
          <button key={i} onClick={()=>{
            if(!extras.find(e=>e.name===s)){
              setExtras(p=>[...p,{id:`x-${Date.now()}-${i}`,name:s,checked:false,aldi:true}]);
            }
          }} style={{
            background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,
            padding:'9px 12px',cursor:'pointer',textAlign:'left',fontSize:12,
            color:T.cream,fontFamily:'inherit',transition:'border-color 0.15s',
          }}
          onMouseEnter={e=>e.currentTarget.style.borderColor=T.orange}
          onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}>
            + {s}
          </button>
        ))}
      </div>
    </div>
  );
};

const LockInPage = () => {
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({weight:'86',goalWeight:'80',goal:'build',budget:'150',
    mealsPerDay:'4',gymDays:'4',prepDays:'2'});
  const [plan,setPlan]=useState(null);

  const generate=()=>{
    const w=Number(form.weight||85);
    const g=form.goal;
    const protein=Math.round(w*(g==='build'?2.2:g==='lose'?1.8:2));
    const cals=Math.round(w*(g==='build'?38:g==='lose'?28:33));
    const water=Math.round(w*0.035*10)/10;
    const mealPrepRecs=RECIPES.filter(r=>r.mealPrep>=4&&r.chapter==='lunch').slice(0,3);
    const breakfastRecs=RECIPES.filter(r=>r.chapter==='breakfast').slice(0,2);
    setPlan({protein,cals,water,mealPrepRecs,breakfastRecs,
      budget:form.budget,goal:g,prepDays:form.prepDays});
    setStep(1);
  };

  if(step===1&&plan)return (
    <div>
      <div style={{background:`linear-gradient(135deg,${T.orangeDim},${T.surface})`,
        border:`1px solid ${T.orange}44`,borderRadius:16,padding:'28px',marginBottom:24}}>
        <div style={{fontSize:11,color:T.orange,fontWeight:700,letterSpacing:2,
          textTransform:'uppercase',marginBottom:6}}>⚡ Your Personalised Plan</div>
        <div style={{fontSize:36,fontWeight:900,color:T.cream,letterSpacing:'-1px',marginBottom:4}}>
          Lock In Mode Active
        </div>
        <div style={{fontSize:14,color:T.muted}}>
          Goal: {plan.goal==='build'?'Build Muscle \uD83D\uDCAA':plan.goal==='lose'?'Lose Fat \uD83D\uDCC9':'Maintain ⚖️'} ·
          Budget: ${plan.budget}/week
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:12,marginBottom:28}}>
        <StatBox icon="\uD83D\uDCAA" value={`${plan.protein}g`} label="Daily Protein Target" color="#5AC983" mono />
        <StatBox icon="\uD83D\uDD25" value={plan.cals} label="Daily Calories" color={T.orange} mono />
        <StatBox icon="\uD83D\uDCA7" value={`${plan.water}L`} label="Daily Water" color="#60B8D4" mono />
        <StatBox icon="\uD83D\uDCC5" value={`${plan.prepDays}x`} label="Prep Sessions/Week" color={T.orange} mono />
      </div>

      <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:T.muted,
        textTransform:'uppercase',marginBottom:12}}>Recommended Lunch Preps</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:14,marginBottom:28}}>
        {plan.mealPrepRecs.map(r=>(
          <div key={r.id} style={{background:T.surface,border:`1px solid ${T.border}`,
            borderRadius:12,padding:'14px 16px',display:'flex',gap:12,alignItems:'center'}}>
            <div style={{width:48,height:48,borderRadius:10,background:T.elevated,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0}}>
              {r.emoji}
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700,color:T.cream,marginBottom:4}}>{r.name}</div>
              <div style={{display:'flex',gap:6}}>
                <Tag color={T.orange}>\uD83D\uDCAA {r.macros.protein}g</Tag>
                <Tag color={T.green}>\uD83D\uDCB0 ${r.cost.toFixed(2)}</Tag>
              </div>
            </div>
          </div>
        ))}
      </div>

      <Btn onClick={()=>setStep(0)} variant="ghost">← Back to Setup</Btn>
    </div>
  );

  return (
    <div>
      <div style={{background:`linear-gradient(135deg,${T.orangeDim},${T.surface})`,
        border:`1px solid ${T.orange}44`,borderRadius:16,padding:'28px',marginBottom:28}}>
        <div style={{fontSize:11,color:T.orange,fontWeight:700,letterSpacing:2,
          textTransform:'uppercase',marginBottom:6}}>⚡ Flagship Feature</div>
        <div style={{fontSize:'clamp(28px,5vw,40px)',fontWeight:900,color:T.cream,
          letterSpacing:'-1px',marginBottom:6}}>Lock In Mode</div>
        <div style={{fontSize:14,color:T.muted}}>
          Enter your stats. Get a personalised meal plan, macro targets, and shopping list.
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:24}}>
          <div style={{fontSize:14,fontWeight:700,color:T.cream,marginBottom:16}}>\uD83D\uDCCA Your Stats</div>
          {[{k:'weight',l:'Current weight (kg)',ph:'86'},{k:'goalWeight',l:'Goal weight (kg)',ph:'80'}].map(f=>(
            <div key={f.k} style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:T.muted,textTransform:'uppercase',
                letterSpacing:1,marginBottom:6}}>{f.l}</div>
              <Input type="number" placeholder={f.ph} value={form[f.k]}
                onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} />
            </div>
          ))}
        </div>

        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:24}}>
          <div style={{fontSize:14,fontWeight:700,color:T.cream,marginBottom:16}}>\uD83C\uDFAF Goal</div>
          {[{v:'lose',l:'Lose Fat',i:'\uD83D\uDCC9'},{v:'maintain',l:'Maintain',i:'⚖️'},{v:'build',l:'Build Muscle',i:'\uD83D\uDCAA'}].map(g=>(
            <button key={g.v} onClick={()=>setForm(p=>({...p,goal:g.v}))} style={{
              width:'100%',background:form.goal===g.v?T.orangeDim:T.elevated,
              border:`1px solid ${form.goal===g.v?T.orange:T.border}`,
              color:form.goal===g.v?T.orange:T.cream,borderRadius:10,
              padding:'12px 16px',cursor:'pointer',fontFamily:'inherit',fontSize:14,
              fontWeight:600,textAlign:'left',marginBottom:8,
              display:'flex',gap:10,alignItems:'center',transition:'all 0.15s',
            }}>
              <span style={{fontSize:20}}>{g.i}</span>{g.l}
              {form.goal===g.v&&<span style={{marginLeft:'auto',color:T.orange}}>✓</span>}
            </button>
          ))}
        </div>

        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:24}}>
          <div style={{fontSize:14,fontWeight:700,color:T.cream,marginBottom:16}}>\uD83D\uDCC5 Your Week</div>
          {[
            {k:'budget',l:'Weekly grocery budget ($)',ph:'150'},
            {k:'mealsPerDay',l:'Meals per day',ph:'4'},
            {k:'gymDays',l:'Gym days per week',ph:'4'},
            {k:'prepDays',l:'Meal prep sessions/week',ph:'2'},
          ].map(f=>(
            <div key={f.k} style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:T.muted,textTransform:'uppercase',
                letterSpacing:1,marginBottom:5}}>{f.l}</div>
              <Input type="number" placeholder={f.ph} value={form[f.k]}
                onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} />
            </div>
          ))}
        </div>
      </div>

      <div style={{marginTop:24}}>
        <Btn onClick={generate} style={{padding:'14px 40px',fontSize:16}}>
          ⚡ Generate My Plan
        </Btn>
      </div>
    </div>
  );
};

const ProgressPage = ({entries,setEntries}) => {
  const [form,setForm]=useState({weight:'',waist:'',chest:'',arms:'',legs:'',bench:'',squat:'',deadlift:'',mood:'8',energy:'7',notes:''});
  const [saved,setSaved]=useState(false);

  const save=()=>{
    if(form.weight){
      setEntries(p=>[...p,{date:new Date().toISOString().split('T')[0],...Object.fromEntries(Object.entries(form).map(([k,v])=>[k,isNaN(v)?v:Number(v)]))}]);
      setSaved(true);
      setTimeout(()=>setSaved(false),2000);
    }
  };

  const latest=entries[entries.length-1]||{};
  const prev=entries[entries.length-2]||{};
  const weightDiff=latest.weight&&prev.weight?((latest.weight-prev.weight).toFixed(1)):null;

  return (
    <div>
      <div style={{fontSize:28,fontWeight:900,color:T.cream,marginBottom:6}}>Progress Tracker</div>
      <div style={{fontSize:13,color:T.muted,marginBottom:24}}>Track your body. Track your lifts. Track your momentum.</div>

      {/* Summary Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:12,marginBottom:28}}>
        {[
          {icon:'⚖️',label:'Latest Weight',val:latest.weight?`${latest.weight}kg`:'-',color:T.orange,
            sub:weightDiff?`${weightDiff>0?'+':''}${weightDiff}kg this week`:''},
          {icon:'\uD83C\uDFCB️',label:'Bench 1RM',val:latest.bench?`${latest.bench}kg`:'-',color:'#5AC983'},
          {icon:'\uD83E\uDDB5',label:'Squat 1RM',val:latest.squat?`${latest.squat}kg`:'-',color:'#B88AE0'},
          {icon:'\uD83D\uDC80',label:'Deadlift 1RM',val:latest.deadlift?`${latest.deadlift}kg`:'-',color:'#60B8D4'},
          {icon:'\uD83D\uDCC5',label:'Entries Logged',val:entries.length>0?`${entries.length}`:'-',color:T.orange},
          {icon:'\uD83D\uDD25',label:'Meal Prep Streak',val:'12 days',color:T.orange},
        ].map((s,i)=>(
          <div key={i} style={{
            background:T.surface,border:`1px solid ${T.border}`,borderRadius:13,
            padding:'16px',textAlign:'center',
          }}>
            <div style={{fontSize:22,marginBottom:6}}>{s.icon}</div>
            <div style={{fontSize:22,fontWeight:900,color:s.color,
              fontFamily:'monospace',marginBottom:2}}>{s.val}</div>
            <div style={{fontSize:10,color:T.muted,fontWeight:600,textTransform:'uppercase'}}>{s.label}</div>
            {s.sub&&<div style={{fontSize:10,color:s.val&&weightDiff&&weightDiff<0?T.green:T.red,
              marginTop:3}}>{s.sub}</div>}
          </div>
        ))}
      </div>

      {/* Simple Weight Chart */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,
        padding:'20px 24px',marginBottom:24}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:T.muted,
          textTransform:'uppercase',marginBottom:16}}>Weight Trend (kg)</div>
        <div style={{display:'flex',alignItems:'flex-end',gap:8,height:100}}>
          {entries.map((e,i)=>{
            const min=Math.min(...entries.map(e=>e.weight||99));
            const max=Math.max(...entries.map(e=>e.weight||0));
            const h=max===min?50:Math.round(((e.weight-min)/(max-min))*80)+10;
            return (
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <div style={{fontSize:10,color:T.muted,fontFamily:'monospace'}}>{e.weight}</div>
                <div style={{
                  width:'100%',height:`${h}px`,background:T.orange,borderRadius:'4px 4px 0 0',
                  opacity:0.7+i*0.075,
                }} />
                <div style={{fontSize:10,color:T.muted}}>W{i+1}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Log Entry */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,padding:'22px 24px'}}>
        <div style={{fontSize:14,fontWeight:700,color:T.cream,marginBottom:18}}>
          Log This Week's Entry
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:12,marginBottom:16}}>
          {[
            {k:'weight',l:'Weight (kg)',ph:'86.0'},
            {k:'waist',l:'Waist (cm)',ph:'90'},
            {k:'chest',l:'Chest (cm)',ph:'102'},
            {k:'arms',l:'Arms (cm)',ph:'38'},
            {k:'legs',l:'Legs (cm)',ph:'58'},
            {k:'bench',l:'Bench 1RM (kg)',ph:'87.5'},
            {k:'squat',l:'Squat 1RM (kg)',ph:'107.5'},
            {k:'deadlift',l:'Deadlift 1RM (kg)',ph:'130'},
            {k:'mood',l:'Mood (1-10)',ph:'8'},
            {k:'energy',l:'Energy (1-10)',ph:'7'},
          ].map(f=>(
            <div key={f.k}>
              <div style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:'uppercase',
                letterSpacing:1,marginBottom:5}}>{f.l}</div>
              <Input type="number" placeholder={f.ph} value={form[f.k]}
                onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} />
            </div>
          ))}
        </div>
        <textarea placeholder="Notes for the week - energy, sleep, how training is going..."
          value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))}
          style={{
            width:'100%',background:T.elevated,border:`1px solid ${T.border}`,
            borderRadius:8,color:T.cream,fontSize:13,padding:'11px 14px',
            fontFamily:'inherit',resize:'vertical',minHeight:80,outline:'none',marginBottom:14,
          }} />
        <Btn onClick={save} variant={saved?'success':'primary'} style={{padding:'12px 32px'}}>
          {saved?'✅ Saved!':'\uD83D\uDCBE Log Entry'}
        </Btn>
      </div>
    </div>
  );
};

const PACK_ITEMS=['Cast iron pan','Jaffle iron','Sharp knife','Chopping board',
  'Foil (heavy duty)','Can opener','Long tongs','Camp pot',
  'Paper towels','Matches + lighter','Eski + ice','Zip-lock bags',
  'Camp chairs','Head torch','Bin bags','First aid kit'];

const CampModePage = ({form,setForm,plan,setPlan,onShopAdd}) => {
  const [addedAll,setAddedAll]=useState(false);
  const [addedIds,setAddedIds]=useState([]);
  const [checkedPack,setCheckedPack]=useState([]);

  const generate=()=>{
    const campingRecipes=RECIPES.filter(r=>r.chapter==='camping');
    const breakfasts=campingRecipes.filter(r=>r.tags.includes('morning-fuel')||r.name.toLowerCase().includes('breakfast')||r.name.toLowerCase().includes('egg'));
    const mains=campingRecipes.filter(r=>!r.tags.includes('morning-fuel')&&!r.tags.includes('dessert')&&!r.tags.includes('classic'));
    const desserts=campingRecipes.filter(r=>r.tags.includes('dessert')||r.name.toLowerCase().includes('smores')||r.name.toLowerCase().includes('mores')||r.name.toLowerCase().includes('chocolate'));
    setPlan({breakfasts:breakfasts.slice(0,2),mains:mains.slice(0,3),desserts:desserts.slice(0,1),
      people:form.people,days:form.days});
    setAddedIds([]);
    setAddedAll(false);
  };

  const handleAddRecipe=(r)=>{
    onShopAdd(r);
    setAddedIds(p=>[...p,r.id]);
  };

  const handleAddAll=()=>{
    const allRecipes=[...(plan.breakfasts||[]),...(plan.mains||[]),...(plan.desserts||[])];
    allRecipes.forEach(r=>onShopAdd(r));
    setAddedIds(allRecipes.map(r=>r.id));
    setAddedAll(true);
  };

  // Camp-specific shopping extras
  const CAMP_EXTRAS=[
    {name:'Bread rolls (for jaffles)',cost:3.49},
    {name:'Corn chips (for nachos)',cost:2.99},
    {name:'Marshmallows',cost:2.49},
    {name:'Digestive biscuits',cost:2.49},
    {name:"Cadbury chocolate for smores",cost:3.49},
    {name:'Baked beans (canned)',cost:0.99},
    {name:'Taco seasoning',cost:0.99},
    {name:'Foil (heavy duty)',cost:3.99},
    {name:'Zip-lock bags (various)',cost:2.99},
    {name:'Paper towels',cost:2.49},
    {name:'Matches / lighter',cost:2.49},
    {name:'Golden syrup (for damper)',cost:3.49},
    {name:'Tomato sauce',cost:2.49},
    {name:'BBQ sauce',cost:2.99},
  ];

  return (
    <div>
      <div style={{background:'linear-gradient(135deg,rgba(58,107,79,0.2),'+T.surface+')',
        border:'1px solid rgba(58,107,79,0.4)',borderRadius:16,padding:'28px',marginBottom:24}}>
        <div style={{fontSize:11,color:'#5AC983',fontWeight:700,letterSpacing:2,
          textTransform:'uppercase',marginBottom:6}}>\uD83C\uDFD5️ Camp Planner</div>
        <div style={{fontSize:36,fontWeight:900,color:T.cream,letterSpacing:'-1px',marginBottom:6}}>Camp Mode</div>
        <div style={{fontSize:14,color:T.muted}}>Set your crew, days, and gear. Get a full camp meal plan.</div>
      </div>

      {!plan?(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:16,marginBottom:24}}>
            <div style={{background:T.surface,border:'1px solid '+T.border,borderRadius:14,padding:22}}>
              <div style={{fontSize:13,fontWeight:700,color:T.cream,marginBottom:14}}>\uD83D\uDC65 Trip Details</div>
              {[{k:'people',l:'Number of people',ph:'4'},{k:'days',l:'Number of days',ph:'3'}].map(f=>(
                <div key={f.k} style={{marginBottom:12}}>
                  <div style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:'uppercase',
                    letterSpacing:1,marginBottom:5}}>{f.l}</div>
                  <Input type="number" placeholder={f.ph} value={form[f.k]}
                    onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} />
                </div>
              ))}
            </div>
            <div style={{background:T.surface,border:'1px solid '+T.border,borderRadius:14,padding:22}}>
              <div style={{fontSize:13,fontWeight:700,color:T.cream,marginBottom:14}}>\uD83C\uDF73 Your Gear</div>
              {[
                {k:'campfire',l:'\uD83D\uDD25 Campfire'},
                {k:'castIron',l:'\uD83C\uDF73 Cast Iron'},
                {k:'weber',l:'\uD83D\uDD25 Weber / BBQ'},
                {k:'jetboil',l:'⛽ Jetboil / Camp Stove'},
              ].map(g=>(
                <label key={g.k} style={{
                  display:'flex',alignItems:'center',gap:10,padding:'10px 12px',
                  background:form[g.k]?T.orangeDim:T.elevated,

                  borderRadius:9,marginBottom:8,cursor:'pointer',transition:'all 0.15s',
                }}>
                  <input type="checkbox" checked={form[g.k]}
                    onChange={e=>setForm(p=>({...p,[g.k]:e.target.checked}))}
                    style={{accentColor:T.orange,width:15,height:15}} />
                  <span style={{fontSize:13,color:form[g.k]?T.orange:T.cream,fontWeight:600}}>{g.l}</span>
                </label>
              ))}
            </div>
          </div>
          <Btn onClick={generate} style={{padding:'13px 36px',fontSize:15}}>

          {[
            {label:'☀️ Breakfasts',recipes:plan.breakfasts},
            {label:'\uD83C\uDF7D️ Mains',recipes:plan.mains},
            {label:'\uD83C\uDF6B Desserts & Drinks',recipes:plan.desserts},
          ].map(section=>(
            <div key={section.label} style={{marginBottom:22}}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:T.muted,
                textTransform:'uppercase',marginBottom:10}}>{section.label}</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {section.recipes.map(r=>{
                  const added=addedIds.includes(r.id);
                  return (
                    <div key={r.id} style={{
                      background:T.surface,
                      border:'1px solid '+(added?T.green+'55':T.border),
                      borderRadius:12,padding:'13px 16px',
                      display:'flex',gap:12,alignItems:'center',transition:'border-color 0.2s',
                    }}>
                      <div style={{fontSize:28,flexShrink:0}}>{r.emoji}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:14,fontWeight:700,color:T.cream,marginBottom:5}}>{r.name}</div>

                          <Tag color={T.orange}>\uD83D\uDCAA {r.macros.protein}g</Tag>

          <div style={{background:T.surface,border:'1px solid '+T.border,borderRadius:14,
            padding:'18px 22px',marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:T.cream,marginBottom:4}}>\uD83C\uDFD5️ Camp Essentials</div>
            <div style={{fontSize:12,color:T.muted,marginBottom:12}}>
              Tap to add camp-specific items to your shopping list.
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:6}}>
              {CAMP_EXTRAS.map((item,i)=>{
                const extraAdded=addedIds.includes('extra-'+i);
                return (
                  <button key={i} onClick={()=>{
                    if(!extraAdded){
                      setAddedIds(p=>[...p,'extra-'+i]);
                      // Add as a shopping item directly via onShopAdd with a fake recipe wrapper
                      onShopAdd({
                        id:'camp-extra-'+i,
                        ingredients:[item.name],
                        cost:item.cost,
                      });
                    }
                  }} style={{
                    background:extraAdded?T.greenBg:T.elevated,
                    border:'1px solid '+(extraAdded?T.green+'55':T.border),
                    color:extraAdded?'#5AC983':T.cream,
                    borderRadius:8,padding:'9px 12px',cursor:'pointer',
                    textAlign:'left',fontSize:12,fontFamily:'inherit',
                    transition:'all 0.15s',display:'flex',justifyContent:'space-between',
                    alignItems:'center',gap:6,
                  }}>
                    <span>{extraAdded?'✅ ':''}{item.name}</span>
                    <span style={{color:T.muted,fontSize:11,flexShrink:0}}>${item.cost.toFixed(2)}</span>
                  </button>
                );
              })}
            </div>
          </div>

          {/* Packing checklist */}
          <div style={{background:T.surface,border:'1px solid '+T.border,borderRadius:14,
            padding:'18px 22px',marginBottom:20}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:700,color:T.cream}}>\uD83D\uDCCB Packing Checklist</div>
              <div style={{fontSize:11,color:T.muted}}>{checkedPack.length}/{PACK_ITEMS.length} packed</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {PACK_ITEMS.map((item,i)=>{
                const chk=checkedPack.includes(i);
                return (
                  <label key={i} onClick={()=>setCheckedPack(p=>chk?p.filter(x=>x!==i):[...p,i])}
                    style={{
                      display:'flex',gap:8,alignItems:'center',fontSize:12,
                      color:chk?T.muted:T.cream,cursor:'pointer',
                      textDecoration:chk?'line-through':'none',padding:'4px 0',
                    }}>
                    <input type="checkbox" checked={chk} onChange={()=>{}} style={{accentColor:T.green}} />
                    {item}
                  </label>
                );
              })}
            </div>
          </div>

          <Btn onClick={()=>setPlan(null)} variant="ghost">← Back to Setup</Btn>
        </div>
      )}
    </div>
  );
};

// --------------------------------------------------
const SettingsPage = () => (
  <div>
    <div style={{fontSize:28,fontWeight:900,color:T.cream,marginBottom:6}}>Settings</div>
    <div style={{fontSize:13,color:T.muted,marginBottom:28}}>Personalise your Sparky Fuel experience.</div>
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      {[
        {label:'Name','value':'Ethan'},
        {label:'Current Weight (kg)','value':'86'},
        {label:'Goal Weight (kg)','value':'80'},
        {label:'Daily Protein Target (g)','value':'180'},
        {label:'Daily Calorie Target','value':'2400'},
      ].map(s=>(
        <div key={s.label} style={{display:'flex',gap:14,alignItems:'center',
          background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:'14px 18px'}}>
          <div style={{flex:1,fontSize:13,fontWeight:600,color:T.cream}}>{s.label}</div>
          <Input value={s.value} onChange={()=>{}} style={{width:160}} />
        </div>
      ))}
      <div style={{padding:'16px 0'}}>
        <Btn>\uD83D\uDCBE Save Settings</Btn>
      </div>
    </div>
  </div>
);

// --------------------------------------------------
const NAV = [
  {id:'home',label:'Dashboard',icon:'⚡'},
  {id:'recipes',label:'All Recipes',icon:'\uD83D\uDCD6'},
  ...CHAPTERS.map(c=>({id:c.id,label:c.label,icon:c.icon,chapter:true})),
  {id:'shopping',label:'Shopping',icon:'\uD83D\uDED2'},
  {id:'lockin',label:'Lock In',icon:'\uD83C\uDFAF'},
  {id:'camping-mode',label:'Camp Mode',icon:'\uD83C\uDFD5️'},
  {id:'progress',label:'Progress',icon:'\uD83D\uDCCA'},
  {id:'settings',label:'Settings',icon:'⚙️'},
];

// --------------------------------------------------
// localStorage helpers
const LS = {
  get: (key, fallback) => { try { const v=localStorage.getItem('sf_'+key); return v!==null?JSON.parse(v):fallback; } catch(e){ return fallback; } },
  set: (key, val) => { try { localStorage.setItem('sf_'+key, JSON.stringify(val)); } catch(e){} },
};

function App() {
  const [page,setPage]=useState('home');
  const [favs,setFavs]=useState(()=>LS.get('favs',[]));
  const [shopItems,setShopItems]=useState(()=>LS.get('shopItems',[]));
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [searchOpen,setSearchOpen]=useState(false);
  const [globalSearch,setGlobalSearch]=useState('');
  const [searchResults,setSearchResults]=useState([]);
  const [openRecipe,setOpenRecipe]=useState(null);
  const [campForm,setCampForm]=useState(()=>LS.get('campForm',{people:'4',days:'3',campfire:true,weber:false,jetboil:true,castIron:true}));
  const [campPlan,setCampPlan]=useState(()=>LS.get('campPlan',null));
  const [progressEntries,setProgressEntries]=useState(()=>LS.get('progressEntries',[]));

  // Persist to localStorage whenever state changes
  useEffect(()=>{ LS.set('favs',favs); },[favs]);
  useEffect(()=>{ LS.set('shopItems',shopItems); },[shopItems]);
  useEffect(()=>{ LS.set('campForm',campForm); },[campForm]);
  useEffect(()=>{ LS.set('campPlan',campPlan); },[campPlan]);
  useEffect(()=>{ LS.set('progressEntries',progressEntries); },[progressEntries]);

  const toggleFav=useCallback((id)=>{
    setFavs(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  },[]);

  const addToShop=useCallback((recipe)=>{
    const priceFor=(ing)=>{
      const n=ing.toLowerCase();
      if(n.includes('chicken breast'))return 5.99;
      if(n.includes('chicken thigh'))return 4.99;
      if(n.includes('beef mince')||n.includes('lean mince'))return 5.49;
      if(n.includes('pork shoulder')||n.includes('pork belly'))return 7.99;
      if(n.includes('pork rib')||n.includes('rack pork'))return 12.99;
      if(n.includes('steak')||n.includes('scotch fillet')||n.includes('rump'))return 13.99;
      if(n.includes('tuna'))return 1.09;
      if(n.includes('salmon'))return 7.99;
      if(n.includes('bacon'))return 4.49;
      if(n.includes('sausage')||n.includes('frankfurt'))return 4.99;
      if(n.includes('egg'))return 3.49;
      if(n.includes('full fat milk')||n.includes('milk'))return 2.19;
      if(n.includes('greek yoghurt')||n.includes('yoghurt'))return 3.49;
      if(n.includes('cream cheese'))return 3.29;
      if(n.includes('thickened cream')||n.includes('cream'))return 2.49;
      if(n.includes('butter'))return 3.79;
      if(n.includes('parmesan'))return 3.99;
      if(n.includes('mozzarella'))return 3.49;
      if(n.includes('shredded cheese')||n.includes('american cheese'))return 4.49;
      if(n.includes('feta'))return 2.99;
      if(n.includes('sour cream'))return 1.99;
      if(n.includes('penne')||n.includes('pasta')||n.includes('spaghetti'))return 1.29;
      if(n.includes('jasmine rice')||n.includes('basmati rice')||n.includes('cooked rice'))return 3.49;
      if(n.includes('rolled oats')||n.includes('oats'))return 2.49;
      if(n.includes('flour tortilla')||n.includes('tortilla'))return 3.29;
      if(n.includes('brioche bun')||n.includes('bread roll')||n.includes('bun'))return 3.49;
      if(n.includes('bread'))return 2.99;
      if(n.includes('panko')||n.includes('breadcrumb'))return 2.29;
      if(n.includes('self-raising flour')||n.includes('plain flour'))return 1.49;
      if(n.includes('black beans')||n.includes('kidney beans'))return 0.99;
      if(n.includes('crushed tomato')||n.includes('diced tomato'))return 0.99;
      if(n.includes('corn kernel')||n.includes('canned corn'))return 0.89;
      if(n.includes('coconut cream'))return 1.79;
      if(n.includes('baked beans'))return 0.99;
      if(n.includes('pesto'))return 3.49;
      if(n.includes('pasta sauce')||n.includes('napoli'))return 2.49;
      if(n.includes('salsa'))return 3.49;
      if(n.includes('baby spinach')||n.includes('spinach'))return 2.99;
      if(n.includes('cherry tomato'))return 3.49;
      if(n.includes('broccoli'))return 2.49;
      if(n.includes('cucumber'))return 1.49;
      if(n.includes('onion'))return 1.99;
      if(n.includes('garlic'))return 1.49;
      if(n.includes('potato'))return 3.49;
      if(n.includes('avocado'))return 1.49;
      if(n.includes('banana'))return 2.99;
      if(n.includes('frozen berries')||n.includes('mixed berries'))return 4.49;
      if(n.includes('lemon')||n.includes('lime'))return 0.79;
      if(n.includes('corn chip'))return 2.99;
      if(n.includes('olive oil'))return 4.99;
      if(n.includes('soy sauce'))return 2.29;
      if(n.includes('honey'))return 4.49;
      if(n.includes('peanut butter'))return 3.49;
      if(n.includes('sesame oil'))return 3.49;
      if(n.includes('oyster sauce'))return 2.99;
      if(n.includes('sweet chilli'))return 2.29;
      if(n.includes('hoisin'))return 2.99;
      if(n.includes('mayo')||n.includes('mayonnaise'))return 3.49;
      if(n.includes('maple syrup'))return 5.99;
      if(n.includes('cocoa'))return 3.49;
      if(n.includes('choc chip')||n.includes('chocolate chip'))return 2.99;
      if(n.includes('bbq sauce'))return 2.99;
      if(n.includes('taco seasoning'))return 0.99;
      if(n.includes('marshmallow'))return 2.49;
      if(n.includes('digestive')||n.includes('biscuit'))return 2.49;
      if(n.includes('granola'))return 3.49;
      if(n.includes('chia seed'))return 4.49;
      if(n.includes('almond')||n.includes('cashew')||n.includes('pumpkin seed'))return 4.99;
      if(n.includes('dried cranberr'))return 3.99;
      if(n.includes('apple juice'))return 2.99;
      if(n.includes('beer'))return 1.80;
      if(n.includes('kalamata olive')||n.includes('olive'))return 2.99;
      if(n.includes('protein powder')||n.includes('protein'))return 0;
      if(n.includes('water')||n.includes('salt')||n.includes('pepper')||
         n.includes('cumin')||n.includes('paprika')||n.includes('turmeric')||
         n.includes('garam masala')||n.includes('oregano')||n.includes('cajun')||
         n.includes('vanilla')||n.includes('baking powder')||n.includes('cornflour')||
         n.includes('brown sugar')||n.includes('sugar')||n.includes('seasoning')||
         n.includes('herb')||n.includes('rosemary')||n.includes('thyme'))return 0;
      return 1.99;
    };
    const newItems=(recipe.ingredients||[]).map((ing,i)=>({
      id:`${recipe.id}-${i}`,
      name:ing,
      checked:false,
      aldi:!ing.toLowerCase().includes('protein powder'),
      cost:priceFor(ing),
    }));
    setShopItems(prev=>{
      const existing=prev.map(p=>p.name);
      return [...prev,...newItems.filter(n=>!existing.includes(n.name))];
    });
  },[]);

  const toggleShopItem=useCallback((item)=>{
    setShopItems(p=>p.map(i=>i.id===item.id?{...i,checked:!i.checked}:i));
  },[]);

  useEffect(()=>{
    if(globalSearch.length>1){
      const res=RECIPES.filter(r=>
        r.name.toLowerCase().includes(globalSearch.toLowerCase())||
        r.tags.some(t=>t.includes(globalSearch.toLowerCase()))||
        r.ingredients?.some(ing=>ing.toLowerCase().includes(globalSearch.toLowerCase()))
      ).slice(0,8);
      setSearchResults(res);
    }else{
      setSearchResults([]);
    }
  },[globalSearch]);

  const navTo=(id)=>{
    setPage(id);
    setSidebarOpen(false);
  };

  const renderPage=()=>{
    if(page==='home')return <Dashboard onNav={navTo} favs={favs} />;
    if(page==='recipes')return <RecipesPage chapter={null} favs={favs} onFavToggle={toggleFav} onShopAdd={addToShop} />;
    if(CHAPTERS.find(c=>c.id===page))return <RecipesPage chapter={page} favs={favs} onFavToggle={toggleFav} onShopAdd={addToShop} />;
    if(page==='shopping')return <ShoppingPage items={shopItems} onToggle={toggleShopItem} onClear={()=>setShopItems([])} />;
    if(page==='lockin')return <LockInPage />;
    if(page==='camping-mode')return <CampModePage form={campForm} setForm={setCampForm} plan={campPlan} setPlan={setCampPlan} onShopAdd={addToShop} />;
    if(page==='progress')return <ProgressPage entries={progressEntries} setEntries={setProgressEntries} />;
    if(page==='settings')return <SettingsPage />;
    return <Dashboard onNav={navTo} favs={favs} />;
  };

  const SIDEBAR_W=240;

  return (
    <div style={{background:T.bg,minHeight:'100vh',color:T.cream,fontFamily:'"Inter",system-ui,sans-serif'}}>

      {/* Sidebar */}
      <div style={{
        position:'fixed',left:0,top:0,bottom:0,width:SIDEBAR_W,
        background:T.surface,borderRight:`1px solid ${T.border}`,
        zIndex:200,display:'flex',flexDirection:'column',
        transform:sidebarOpen?'translateX(0)':`translateX(-${SIDEBAR_W}px)`,
        transition:'transform 0.25s ease',
      }}>
        {/* Logo */}
        <div style={{padding:'22px 20px 16px',borderBottom:`1px solid ${T.border}`}}>
          <div style={{fontSize:22,fontWeight:900,color:T.orange,letterSpacing:'-0.5px'}}>
            ⚡ SPARKY FUEL
          </div>
          <div style={{fontSize:10,color:T.muted,letterSpacing:2,marginTop:2,fontWeight:600}}>
            TRADIE LIFESTYLE OS
          </div>
        </div>

        {/* Nav */}
        <div style={{flex:1,overflowY:'auto',padding:'10px 10px',scrollbarWidth:'none'}}>
          {NAV.map(item=>{
            const active=page===item.id;
            const isCh=item.chapter;
            return (
              <button key={item.id} onClick={()=>navTo(item.id)} style={{
                width:'100%',display:'flex',alignItems:'center',gap:10,
                padding: isCh?'8px 12px 8px 20px':'10px 12px',
                borderRadius:9,border:'none',cursor:'pointer',fontFamily:'inherit',
                background:active?T.orangeDim:'transparent',
                color:active?T.orange:isCh?T.muted:T.cream,
                fontSize:isCh?12:13,fontWeight:isCh?500:600,
                marginBottom:2,transition:'all 0.12s',
                borderLeft:active?`2px solid ${T.orange}`:'2px solid transparent',
              }}
              onMouseEnter={e=>{ if(!active){e.currentTarget.style.background=T.elevated;} }}
              onMouseLeave={e=>{ if(!active){e.currentTarget.style.background='transparent';} }}>
                <span style={{fontSize:isCh?13:15,flexShrink:0}}>{item.icon}</span>
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.label}</span>
                {item.id==='shopping'&&shopItems.length>0&&(
                  <span style={{
                    marginLeft:'auto',background:T.orange,color:'#fff',
                    borderRadius:100,padding:'1px 7px',fontSize:10,fontWeight:700,
                  }}>{shopItems.filter(i=>!i.checked).length}</span>
                )}
              </button>
            );
          })}
        </div>

        <div style={{padding:'14px 18px',borderTop:`1px solid ${T.border}`,
          fontSize:10,color:T.dim,letterSpacing:1}}>
          v1.0 · sparkyfuel.com
        </div>
      </div>

      {/* Sidebar backdrop (mobile) */}
      {sidebarOpen&&(
        <div style={{
          position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:199,backdropFilter:'blur(4px)',
        }} onClick={()=>setSidebarOpen(false)} />
      )}

      {/* Top bar */}
      <div style={{
        position:'fixed',top:0,left:0,right:0,height:56,
        background:T.surface,borderBottom:`1px solid ${T.border}`,
        zIndex:100,display:'flex',alignItems:'center',padding:'0 16px',gap:12,
      }}>
        <button onClick={()=>setSidebarOpen(!sidebarOpen)} style={{
          background:'none',border:'none',color:T.cream,fontSize:20,
          cursor:'pointer',padding:6,borderRadius:7,lineHeight:1,
          display:'flex',alignItems:'center',justifyContent:'center',
        }}>
          {sidebarOpen?'✕':'☰'}
        </button>

        <div style={{fontSize:16,fontWeight:900,color:T.orange,letterSpacing:'-0.3px'}}>
          ⚡ SPARKY FUEL
        </div>

        <div style={{flex:1}} />

        {/* Search icon button - opens overlay */}
        <button onClick={()=>setSearchOpen(true)} style={{
          background:T.elevated,border:`1px solid ${T.border}`,color:T.cream,
          borderRadius:8,padding:'8px 12px',cursor:'pointer',fontSize:16,
          display:'flex',alignItems:'center',gap:6,fontFamily:'inherit',
        }}>
          \uD83D\uDD0D
        </button>

        {/* Search overlay */}
        {searchOpen&&(
          <div style={{
            position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',zIndex:600,
            display:'flex',alignItems:'flex-start',justifyContent:'center',
            padding:'80px 16px 20px',backdropFilter:'blur(6px)',
          }} onClick={e=>{if(e.target===e.currentTarget){setSearchOpen(false);setGlobalSearch('');}}}>
            <div style={{
              background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,
              width:'100%',maxWidth:560,boxShadow:'0 24px 60px rgba(0,0,0,0.7)',overflow:'hidden',
            }}>
              {/* Search input */}
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',
                borderBottom:`1px solid ${T.border}`}}>
                <span style={{fontSize:18}}>\uD83D\uDD0D</span>
                <input
                  autoFocus
                  placeholder="Search recipes, ingredients, goals..."
                  value={globalSearch}
                  onChange={e=>setGlobalSearch(e.target.value)}
                  style={{
                    flex:1,background:'transparent',border:'none',
                    color:T.cream,fontSize:15,fontFamily:'inherit',outline:'none',
                  }}
                />
                <button onClick={()=>{setSearchOpen(false);setGlobalSearch('');}} style={{
                  background:'none',border:'none',color:T.muted,fontSize:18,
                  cursor:'pointer',padding:4,lineHeight:1,
                }}>✕</button>
              </div>

              {/* Results */}
              {globalSearch.length>0&&(
                <div style={{maxHeight:400,overflowY:'auto'}}>
                  {searchResults.length===0?(
                    <div style={{padding:'28px 16px',textAlign:'center',color:T.muted,fontSize:13}}>
                      No recipes found for that search
                    </div>
                  ):(
                    searchResults.map(r=>(
                      <button key={r.id} onClick={()=>{setOpenRecipe(r);setSearchOpen(false);setGlobalSearch('');}}
                        style={{
                          width:'100%',display:'flex',gap:12,padding:'12px 16px',
                          background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',
                          borderBottom:`1px solid ${T.border}`,textAlign:'left',
                          transition:'background 0.1s',
                        }}
                        onMouseEnter={e=>e.currentTarget.style.background=T.elevated}
                        onMouseLeave={e=>e.currentTarget.style.background='none'}>
                        <div style={{
                          width:44,height:44,borderRadius:10,background:T.elevated,
                          overflow:'hidden',display:'flex',alignItems:'center',
                          justifyContent:'center',fontSize:22,flexShrink:0,
                        }}>
                          {r.photo
                            ?<img src={r.photo} style={{width:'100%',height:'100%',objectFit:'cover'}}
                                onError={e=>{e.target.style.display='none'}} alt=""/>
                            :r.emoji}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:14,fontWeight:700,color:T.cream,marginBottom:3}}>{r.name}</div>
                          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                            <span style={{fontSize:11,color:T.orange,fontWeight:600}}>\uD83D\uDCAA {r.macros.protein}g protein</span>
                            <span style={{fontSize:11,color:T.muted}}>\uD83D\uDD25 {r.macros.calories} kcal</span>
                            <span style={{fontSize:11,color:T.muted}}>\uD83D\uDCB0 \${r.cost.toFixed(2)}</span>
                            <span style={{fontSize:11,color:T.muted}}>⏱ {r.prep+r.cook}m</span>
                          </div>
                        </div>
                      </button>
                    ))
                  )}
                </div>
              )}

              {/* Quick links when no query */}
              {globalSearch.length===0&&(
                <div style={{padding:'14px 16px'}}>
                  <div style={{fontSize:11,fontWeight:700,color:T.muted,textTransform:'uppercase',
                    letterSpacing:1,marginBottom:10}}>Quick Search</div>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    {['high-protein','chicken','camping','under $5','meal prep','BBQ','quick'].map(tag=>(
                      <button key={tag} onClick={()=>setGlobalSearch(tag)} style={{
                        background:T.elevated,border:`1px solid ${T.border}`,color:T.cream,
                        borderRadius:100,padding:'5px 12px',cursor:'pointer',
                        fontSize:12,fontFamily:'inherit',fontWeight:500,
                      }}>{tag}</button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        )}

        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>navTo('shopping')} style={{
            background:'none',border:`1px solid ${T.border}`,color:T.cream,
            borderRadius:8,padding:'7px 10px',cursor:'pointer',fontSize:13,position:'relative',
          }}>
            \uD83D\uDED2
            {shopItems.filter(i=>!i.checked).length>0&&(
              <span style={{
                position:'absolute',top:-4,right:-4,background:T.orange,color:'#fff',
                borderRadius:'50%',width:16,height:16,fontSize:9,fontWeight:700,
                display:'flex',alignItems:'center',justifyContent:'center',
              }}>{shopItems.filter(i=>!i.checked).length}</span>
            )}
          </button>
          <button onClick={()=>navTo('progress')} style={{
            background:'none',border:`1px solid ${T.border}`,color:T.cream,
            borderRadius:8,padding:'7px 10px',cursor:'pointer',fontSize:13,
          }}>\uD83D\uDCCA</button>
        </div>
      </div>

      {/* Main content */}
      <div style={{
        marginLeft:sidebarOpen?0:0,
        paddingTop:56,minHeight:'100vh',
      }}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'28px 16px 80px'}}>
          {renderPage()}
        </div>
      </div>

      {/* Global recipe modal */}
      {openRecipe&&(
        <RecipeModal
          recipe={openRecipe}
          onClose={()=>setOpenRecipe(null)}
          onFavToggle={toggleFav}
          isFav={favs.includes(openRecipe.id)}
          onShopAdd={addToShop}
        />
      )}
    </div>
  );
}

</script>
</body>
</html>
